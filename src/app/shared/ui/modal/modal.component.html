<div *ngIf="isOpen" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4"
  (click)="close()">
  <div class="modal-panel max-h-[90vh] w-full overflow-y-auto rounded-[28px] bg-white p-6 shadow-xl"
    [ngClass]="sizeClass" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900">{{ heading }}</h2>
        <p *ngIf="subheading" class="mt-1 text-sm text-gray-500">{{ subheading }}</p>
      </div>
      <button type="button" (click)="close()"
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        aria-label="Close panel">
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>

    <!-- Cuerpo proyectado (incluye el footer de cada panel; todo scrollea junto) -->
    <ng-content></ng-content>
  </div>
</div>
