<div>
  <!-- Method toggle -->
  <div class="inline-flex items-center rounded-full border border-gray-200 p-1">
    <button type="button" (click)="setMethod('draw')"
      class="flex items-center gap-1.5 rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
      [ngClass]="method() === 'draw' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
      <ion-icon name="pencil-outline" class="text-sm"></ion-icon>
      Draw
    </button>
    <button type="button" (click)="setMethod('type')"
      class="flex items-center gap-1.5 rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
      [ngClass]="method() === 'type' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
      <ion-icon name="text-outline" class="text-sm"></ion-icon>
      Type
    </button>
    <button type="button" (click)="setMethod('upload')"
      class="flex items-center gap-1.5 rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
      [ngClass]="method() === 'upload' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
      <ion-icon name="cloud-upload-outline" class="text-sm"></ion-icon>
      Upload
    </button>
  </div>

  <!-- Draw -->
  <div *ngIf="method() === 'draw'" class="mt-4">
    <div class="relative overflow-hidden rounded-2xl border-2 border-dashed border-gray-200 bg-[#FAF9F7]">
      <canvas #canvas class="h-40 w-full touch-none" style="touch-action: none;" (pointerdown)="onPointerDown($event)"
        (pointermove)="onPointerMove($event)" (pointerup)="onPointerUp()" (pointerleave)="onPointerUp()"></canvas>
      <p *ngIf="!hasDrawing()" class="pointer-events-none absolute inset-0 flex items-center justify-center text-sm text-gray-400">
        Sign above using your mouse or touchscreen
      </p>
    </div>
  </div>

  <!-- Type -->
  <div *ngIf="method() === 'type'" class="mt-4 flex flex-col gap-3">
    <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
      <input type="text" placeholder="Type your full name" [ngModel]="typedText()" name="typedText"
        (ngModelChange)="typedText.set($event)"
        class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <button *ngFor="let font of fontOptions" type="button" (click)="selectFont(font.id)"
        class="rounded-full border px-4 py-1.5 text-sm transition-colors"
        [style.font-family]="font.fontFamily" [style.font-style]="'italic'"
        [ngClass]="font.id === selectedFontId() ? 'border-gray-900 bg-gray-50 text-gray-900' : 'border-gray-200 text-gray-600 hover:bg-gray-50'">
        {{ font.label }}
      </button>
    </div>

    <div class="flex h-32 items-center justify-center rounded-2xl border-2 border-dashed border-gray-200 bg-[#FAF9F7] px-4">
      <p *ngIf="typedText().trim(); else typePlaceholder" class="text-4xl text-gray-900"
        [style.font-family]="selectedFontFamily()" [style.font-style]="'italic'">
        {{ typedText() }}
      </p>
      <ng-template #typePlaceholder>
        <p class="text-sm text-gray-400">Your signature preview will appear here</p>
      </ng-template>
    </div>
  </div>

  <!-- Upload -->
  <div *ngIf="method() === 'upload'" class="mt-4">
    <div *ngIf="!uploadedDataUrl()" class="rounded-2xl border-2 border-dashed border-gray-200 bg-[#FAF9F7] p-6 text-center">
      <ion-icon name="image-outline" class="text-3xl text-gray-300"></ion-icon>
      <p class="mt-2 text-sm text-gray-500">Upload an image of your signature</p>
      <label
        class="mt-3 inline-flex cursor-pointer items-center gap-2 rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        <ion-icon name="folder-open-outline" class="text-sm"></ion-icon>
        Choose file
        <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
      </label>
      <p *ngIf="uploadError()" class="mt-2 text-xs text-red-500">{{ uploadError() }}</p>
    </div>

    <div *ngIf="uploadedDataUrl()" class="flex flex-col items-center gap-3 rounded-2xl border-2 border-dashed border-gray-200 bg-[#FAF9F7] p-6">
      <img [src]="uploadedDataUrl()" alt="Uploaded signature preview" class="h-24 max-w-full object-contain" />
      <label
        class="inline-flex cursor-pointer items-center gap-2 rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        <ion-icon name="swap-horizontal-outline" class="text-sm"></ion-icon>
        Choose different file
        <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
      </label>
    </div>
  </div>

  <div class="mt-3 flex justify-end">
    <button type="button" (click)="clearCurrent()"
      class="flex items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      <ion-icon name="refresh-outline" class="text-sm"></ion-icon>
      Clear
    </button>
  </div>
</div>
