<app-modal [isOpen]="isOpen" [heading]="heading" size="sm" (closed)="cancelled.emit()">
  <div class="mt-4 flex items-start gap-3">
    <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-red-50">
      <ion-icon name="alert-outline" class="text-xl text-red-500"></ion-icon>
    </span>
    <p class="pt-2 text-sm leading-relaxed text-gray-600">{{ message }}</p>
  </div>

  <div class="mt-6 flex items-center justify-end gap-2">
    <button type="button" (click)="cancelled.emit()"
      class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      Cancel
    </button>
    <button type="button" (click)="confirmed.emit()"
      class="rounded-full bg-red-500 px-5 py-2 text-sm font-semibold text-white hover:bg-red-600 transition-colors">
      {{ confirmLabel }}
    </button>
  </div>
</app-modal>
