<div class="flex flex-col gap-4">
  <button type="button" (click)="compose()"
    class="flex w-full items-center justify-center gap-2 rounded-full bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
    <ion-icon name="create-outline" class="text-base"></ion-icon>
    Compose
  </button>

  <nav #folderNav class="relative flex flex-col gap-1">
    <!-- Pill deslizante del ítem activo -->
    <div *ngIf="indicatorReady()"
      class="folder-active-indicator absolute rounded-2xl bg-gray-900 pointer-events-none"
      [style.top.px]="indicatorTop()" [style.left.px]="indicatorLeft()" [style.width.px]="indicatorWidth()"
      [style.height.px]="indicatorHeight()"></div>

    <button #folderButton *ngFor="let folder of folders; trackBy: trackByFolderId" type="button" (click)="select(folder.id)"
      class="relative z-10 flex w-full items-center gap-3 rounded-2xl px-3 py-2.5 text-left text-sm font-medium transition-colors"
      [ngClass]="folder.id === activeFolderId ? 'text-white' : 'text-gray-600 hover:bg-gray-50'">
      <ion-icon [name]="folder.icon" class="text-base" [ngClass]="folder.id === activeFolderId ? 'text-white' : 'text-gray-400'"></ion-icon>
      <span class="flex-1 truncate">{{ folder.label }}</span>
      <span *ngIf="folder.unreadCount > 0"
        class="flex h-5 min-w-[1.25rem] shrink-0 items-center justify-center rounded-full px-1.5 text-[10px] font-semibold"
        [ngClass]="folder.id === activeFolderId ? 'bg-white text-gray-900' : 'bg-gray-900 text-white'">{{ folder.unreadCount }}</span>
    </button>
  </nav>
</div>
