<div class="compose-root flex h-full flex-col">
  <!-- Header -->
  <div class="flex items-start justify-between gap-4 border-b border-gray-100 pb-4">
    <div>
      <h2 class="text-xl font-bold text-gray-900">New message</h2>
      <p class="mt-1 text-sm text-gray-500">Compose an email</p>
    </div>
    <button type="button" (click)="close()"
      class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-gray-200 text-gray-400 hover:bg-gray-50 hover:text-gray-900 transition-colors"
      aria-label="Close compose">
      <ion-icon name="close-outline" class="text-lg"></ion-icon>
    </button>
  </div>

  <!-- Recipient fields -->
  <div class="mt-4 flex flex-col gap-2">
    <div class="flex h-10 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
      <span class="mr-2 w-14 shrink-0 text-sm text-gray-400">To</span>
      <input type="text" placeholder="recipient@email.com" [ngModel]="to()" name="to"
        (ngModelChange)="to.set($event)"
        class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
    </div>
    <div class="flex h-10 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
      <span class="mr-2 w-14 shrink-0 text-sm text-gray-400">Cc</span>
      <input type="text" placeholder="cc@email.com" [ngModel]="cc()" name="cc" (ngModelChange)="cc.set($event)"
        class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
    </div>
    <div class="flex h-10 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
      <span class="mr-2 w-14 shrink-0 text-sm text-gray-400">Subject</span>
      <input type="text" placeholder="Subject" [ngModel]="subject()" name="subject"
        (ngModelChange)="subject.set($event)"
        class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
    </div>
  </div>

  <!-- Toolbox -->
  <div class="mt-4 flex flex-wrap items-center gap-1.5 rounded-2xl border border-gray-100 bg-[#FAF9F7] px-2 py-2">
    <!-- Attach files (real native picker, no upload) -->
    <label
      class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-full text-gray-500 hover:bg-white hover:text-gray-900 transition-colors"
      title="Attach files">
      <ion-icon name="attach-outline" class="text-lg"></ion-icon>
      <input type="file" multiple class="hidden" (change)="onFilesSelected($event)" />
    </label>

    <span class="mx-1 h-5 w-px bg-gray-200"></span>

    <!-- Format buttons (visual toggle) -->
    <button *ngFor="let tool of formatTools" type="button" (click)="toggleFormat(tool.key)"
      class="flex h-9 w-9 items-center justify-center rounded-full transition-colors"
      [ngClass]="isFormatActive(tool.key) ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-white hover:text-gray-900'"
      [title]="tool.label" [attr.aria-pressed]="isFormatActive(tool.key)">
      <span *ngIf="tool.glyph as glyph" class="text-sm leading-none" [ngClass]="tool.glyphClass">{{ glyph }}</span>
      <ion-icon *ngIf="!tool.glyph" [name]="tool.icon" class="text-lg"></ion-icon>
    </button>
  </div>

  <!-- Body -->
  <textarea placeholder="Write your message..." [ngModel]="body()" name="body" (ngModelChange)="body.set($event)"
    class="mt-4 min-h-0 w-full flex-1 resize-none rounded-2xl border border-gray-100 bg-white p-4 text-sm leading-relaxed text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-300 transition-colors"></textarea>

  <!-- Attachment chips -->
  <div *ngIf="attachments().length > 0" class="mt-3 flex flex-wrap gap-2">
    <span *ngFor="let file of attachments(); let i = index"
      class="flex items-center gap-2 rounded-full border border-gray-200 bg-white py-1.5 pl-3 pr-2 text-xs text-gray-700">
      <ion-icon name="document-outline" class="text-sm text-gray-400"></ion-icon>
      <span class="max-w-[12rem] truncate font-medium">{{ file.name }}</span>
      <span class="text-gray-400">{{ formatSize(file.size) }}</span>
      <button type="button" (click)="removeAttachment(i)"
        class="flex h-5 w-5 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors"
        [attr.aria-label]="'Remove ' + file.name">
        <ion-icon name="close-outline" class="text-sm"></ion-icon>
      </button>
    </span>
  </div>

  <!-- Footer -->
  <div class="mt-4 flex items-center justify-between gap-2 border-t border-gray-100 pt-4">
    <button type="button" (click)="close()"
      class="flex items-center gap-2 rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      <ion-icon name="trash-outline" class="text-base"></ion-icon>
      Discard
    </button>
    <button type="button" (click)="send()" [disabled]="!canSend()"
      class="flex items-center gap-2 rounded-full bg-gray-900 px-6 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
      <ion-icon name="send-outline" class="text-base"></ion-icon>
      Send
    </button>
  </div>
</div>
