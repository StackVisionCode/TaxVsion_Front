<div class="overflow-x-auto">
  <table class="w-full min-w-[720px] border-separate border-spacing-0 text-sm">
    <thead>
      <tr>
        <th class="rounded-l-2xl bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Name</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Email</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Date</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Status</th>
        <th class="rounded-r-2xl bg-[#FAF9F7] px-4 py-3 text-right font-semibold text-gray-900">Reward</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let referral of referrals; trackBy: trackByReferralId; let last = last" class="group">
        <td class="rounded-l-2xl px-4 py-3.5 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          <span class="flex items-center gap-3">
            <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-xs font-semibold text-white"
              [ngClass]="referral.avatarColor">
              {{ referral.initials }}
            </span>
            <span class="font-medium text-gray-900">{{ referral.name }}</span>
          </span>
        </td>
        <td class="px-4 py-3.5 text-gray-500 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          {{ referral.email }}
        </td>
        <td class="px-4 py-3.5 text-gray-500 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          {{ referral.date }}
        </td>
        <td class="px-4 py-3.5 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          <span class="inline-flex items-center gap-2 rounded-full border px-3 py-0.5 text-xs font-medium"
            [ngClass]="statusChip(referral.status)">
            <span class="h-1.5 w-1.5 rounded-full" [ngClass]="statusDot(referral.status)"></span>
            {{ statusLabel(referral.status) }}
          </span>
        </td>
        <td class="rounded-r-2xl px-4 py-3.5 text-right font-bold transition-colors group-hover:bg-gray-50"
          [class.border-b]="!last" [class.border-gray-100]="!last"
          [ngClass]="referral.amount > 0 ? 'text-gray-900' : 'text-gray-300'">
          {{ referral.amount > 0 ? formatCurrency(referral.amount) : '—' }}
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="referrals.length === 0" class="px-4 py-10 text-center">
    <ion-icon name="people-outline" class="text-3xl text-gray-300"></ion-icon>
    <p class="mt-2 text-sm text-gray-500">No referrals match your search</p>
  </div>
</div>
