<div class="min-h-full pt-3 pb-1 flex flex-col gap-6">
  <!-- Stats row -->
  <div class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(170px,1fr))]">
    <div class="rounded-[24px] bg-[#F2E3C9] p-5">
      <p class="text-sm text-gray-600">Total</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ totalCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#CBD9F2] p-5">
      <p class="text-sm text-gray-600">Unread</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ unreadCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#DCDCDC] p-5">
      <p class="text-sm text-gray-600">Today</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ todayCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#EEEBFA] p-5">
      <p class="text-sm text-gray-600">This week</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ thisWeekCount() }}</p>
    </div>
  </div>

  <!-- Notifications card -->
  <div class="bg-white rounded-[28px] p-6">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <h2 class="text-xl font-bold text-gray-900">Notifications</h2>
        <p class="mt-1 text-sm text-gray-500">Stay on top of client activity, payments and documents</p>
      </div>
      <button type="button" (click)="markAllAsRead()"
        class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white transition-colors hover:bg-gray-700">
        <ion-icon name="checkmark-done-outline" class="text-base"></ion-icon>
        Mark all as read
      </button>
    </div>

    <!-- Filter bar -->
    <div class="mt-4 flex flex-wrap items-center gap-2">
      <button *ngFor="let option of filters" type="button" (click)="setFilter(option)"
        class="rounded-full px-4 py-2 text-sm font-medium transition-colors"
        [ngClass]="activeFilter() === option ? 'bg-gray-900 text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-100'">
        {{ filterLabel(option) }}
      </button>

      <div
        class="ml-auto flex h-10 items-center rounded-full border border-gray-200 bg-white px-4 transition-colors focus-within:border-gray-300">
        <ion-icon name="search-outline" class="mr-2 text-base text-gray-400"></ion-icon>
        <input type="text" placeholder="Search notifications" [ngModel]="search()" name="search"
          (ngModelChange)="search.set($event)"
          class="h-full w-48 bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>
    </div>

    <!-- List -->
    <div class="mt-5">
      <app-notification-list [notifications]="visibleNotifications()" (markRead)="markRead($event)"
        (markUnread)="markUnread($event)" (delete)="deleteNotification($event)"></app-notification-list>
    </div>
  </div>
</div>
