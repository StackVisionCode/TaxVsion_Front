<div class="bg-white rounded-[28px] p-6 h-full">
  <h2 class="text-xl font-bold text-gray-900">Signed Documents</h2>
  <p class="mt-1 text-sm text-gray-500">Latest e-signature activity</p>

  <div class="mt-4 flex flex-col">
    <div *ngFor="let doc of documents; let last = last" class="flex items-center gap-3 py-3"
      [class.border-b]="!last" [class.border-gray-100]="!last">
      <!-- File icon in pastel circle -->
      <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" [ngClass]="doc.iconBg">
        <ion-icon name="document-text-outline" class="text-lg text-gray-700"></ion-icon>
      </span>

      <!-- File name + signers + date -->
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-medium text-gray-900">{{ doc.fileName }}</p>
        <div class="mt-1.5 flex items-center gap-2">
          <div class="flex -space-x-2">
            <span *ngFor="let signer of doc.signers"
              class="flex h-6 w-6 items-center justify-center rounded-full text-[10px] font-semibold text-white ring-2 ring-white"
              [ngClass]="signer.bg">
              {{ signer.initials }}
            </span>
          </div>
          <span class="text-xs text-gray-400">{{ doc.date }}</span>
        </div>
      </div>

      <!-- Status chip -->
      <span class="shrink-0 rounded-full border px-3 py-1 text-xs font-medium" [ngClass]="statusChipClass(doc.status)">
        {{ doc.status }}
      </span>
    </div>
  </div>
</div>
