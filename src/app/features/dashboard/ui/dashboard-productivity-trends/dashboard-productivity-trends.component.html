<div class="bg-white rounded-[28px] p-6 h-full">
  <!-- Header -->
  <div class="flex items-start justify-between">
    <div>
      <h2 class="text-xl font-bold text-gray-900">Productivity Trends</h2>
      <p class="mt-1 text-sm text-gray-500">Daily focus hours</p>
    </div>

    <!-- Range dropdown (Week / Month) -->
    <div class="relative" data-dropdown="trend-range">
      <button type="button" (click)="toggleRangeDropdown()"
        class="flex items-center gap-1.5 rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
        {{ range() }}
        <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
      </button>

      <div *ngIf="isRangeOpen()"
        class="absolute right-0 top-full z-20 mt-2 w-32 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
        <button *ngFor="let option of ranges" type="button" (click)="selectRange(option)"
          class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
          {{ option }}
          <ion-icon *ngIf="option === range()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Body: flex-wrap para adaptarse al ancho del slot (span 1 o 2) -->
  <div class="mt-6 flex flex-wrap items-stretch gap-6">
    <!-- Summary mini-card -->
    <div class="shrink-0 self-center rounded-2xl bg-white p-5 shadow-[0_4px_20px_rgba(0,0,0,0.06)]">
      <div class="text-3xl font-bold text-gray-900">{{ summary().total }}</div>
      <p class="mt-1 text-sm text-gray-500">{{ summary().caption }}</p>
      <span
        class="mt-3 inline-block rounded-full border border-emerald-200 px-3 py-1 text-xs font-medium text-emerald-600">
        {{ summary().delta }}
      </span>
    </div>

    <!-- Pill bar chart -->
    <div #chartTrack class="relative flex-1 min-w-[15rem] flex items-end justify-around gap-2 min-h-[13rem] pt-8">
      <div *ngFor="let bar of bars(); let i = index" class="flex h-full flex-col items-center justify-end gap-2"
        (mouseenter)="onBarEnter(i)">
        <div #barBox class="relative flex h-44 w-11 items-end justify-center">
          <!-- Bar -->
          <div *ngIf="bar.style !== 'empty'; else emptyDay" class="w-full rounded-full trend-bar"
            [ngClass]="'trend-bar--' + bar.style" [style.height.%]="barHeight(bar)"></div>
          <ng-template #emptyDay>
            <span class="mb-0 h-11 w-11 rounded-full bg-white shadow-[0_2px_10px_rgba(0,0,0,0.05)]"></span>
          </ng-template>
        </div>

        <span class="text-sm text-gray-500">{{ bar.label }}</span>
      </div>

      <!-- Tooltip deslizante: un solo elemento persistente cuya posición se
           anima (mismo patrón que el pill activo del sidebar), en vez de
           montar/desmontar un tooltip nuevo por barra. -->
      <div *ngIf="tooltipReady() && tooltipBar() as bar"
        class="chart-tooltip pointer-events-none absolute z-10 flex -translate-x-1/2 -translate-y-full flex-col items-center"
        [style.left.px]="tooltipLeft()" [style.top.px]="tooltipTop()">
        <span class="whitespace-nowrap rounded-full bg-gray-900 px-3 py-1.5 text-xs font-semibold text-white shadow-md">
          {{ tooltipLabel(bar) }}
        </span>
        <span class="mt-1 h-2 w-2 rounded-full bg-white ring-2 ring-gray-900"></span>
      </div>
    </div>
  </div>
</div>
