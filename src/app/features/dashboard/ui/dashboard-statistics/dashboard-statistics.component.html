<!-- Loading State -->
<div *ngIf="loading()" class="flex items-center justify-center py-8">
  <div class="flex flex-col items-center gap-3">
    <div class="w-8 h-8 border-3 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-sm text-gray-500 font-medium">Loading statistics...</p>
  </div>
</div>

<!-- Statistics Content -->
<div *ngIf="!loading()" class="space-y-3">
  <!-- Total Customers -->
  <div
    class="group relative overflow-hidden flex items-center justify-between p-4 bg-gradient-to-br from-blue-50 to-blue-100/50 rounded-xl hover:from-blue-100 hover:to-blue-200/50 transition-all duration-300 cursor-pointer">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div
        class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center group-hover:bg-blue-500/20 transition-colors flex-shrink-0">
        <ion-icon name="people-outline" class="text-2xl text-blue-600"></ion-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-blue-600 uppercase tracking-wide mb-0.5">
          Total Customers
        </p>
        <p class="text-2xl font-bold text-gray-800 truncate">
          {{statistics().totalCustomers}}
        </p>
      </div>
    </div>
    <div
      class="absolute -right-4 -bottom-4 w-24 h-24 bg-blue-500/5 rounded-full group-hover:scale-110 transition-transform duration-300">
    </div>
  </div>

  <!-- Pending Invoices -->
  <div
    class="group relative overflow-hidden flex items-center justify-between p-4 bg-gradient-to-br from-amber-50 to-amber-100/50 rounded-xl hover:from-amber-100 hover:to-amber-200/50 transition-all duration-300 cursor-pointer">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div
        class="w-12 h-12 bg-amber-500/10 rounded-xl flex items-center justify-center group-hover:bg-amber-500/20 transition-colors flex-shrink-0">
        <ion-icon name="document-text-outline" class="text-2xl text-amber-600"></ion-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-amber-600 uppercase tracking-wide mb-0.5">
          Pending Invoices
        </p>
        <p class="text-2xl font-bold text-gray-800 truncate">
          {{statistics().pendingInvoices}}
        </p>
      </div>
    </div>
    <div
      class="absolute -right-4 -bottom-4 w-24 h-24 bg-amber-500/5 rounded-full group-hover:scale-110 transition-transform duration-300">
    </div>
  </div>

  <!-- Monthly Revenue -->
  <div
    class="group relative overflow-hidden flex items-center justify-between p-4 bg-gradient-to-br from-emerald-50 to-emerald-100/50 rounded-xl hover:from-emerald-100 hover:to-emerald-200/50 transition-all duration-300 cursor-pointer">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div
        class="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center group-hover:bg-emerald-500/20 transition-colors flex-shrink-0">
        <ion-icon name="trending-up-outline" class="text-2xl text-emerald-600"></ion-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-emerald-600 uppercase tracking-wide mb-0.5">
          Monthly Revenue
        </p>
        <p class="text-2xl font-bold text-gray-800 truncate">
          {{formatCurrency(statistics().monthlyRevenue)}}
        </p>
      </div>
    </div>
    <div
      class="absolute -right-4 -bottom-4 w-24 h-24 bg-emerald-500/5 rounded-full group-hover:scale-110 transition-transform duration-300">
    </div>
  </div>

  <!-- Signed Documents -->
  <div *ngIf="statistics().signedDocuments > 0"
    class="group relative overflow-hidden flex items-center justify-between p-4 bg-gradient-to-br from-purple-50 to-purple-100/50 rounded-xl hover:from-purple-100 hover:to-purple-200/50 transition-all duration-300 cursor-pointer">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div
        class="w-12 h-12 bg-purple-500/10 rounded-xl flex items-center justify-center group-hover:bg-purple-500/20 transition-colors flex-shrink-0">
        <ion-icon name="checkmark-done-outline" class="text-2xl text-purple-600"></ion-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-purple-600 uppercase tracking-wide mb-0.5">
          Signed Documents
        </p>
        <p class="text-2xl font-bold text-gray-800 truncate">
          {{statistics().signedDocuments}}
        </p>
      </div>
    </div>
    <div
      class="absolute -right-4 -bottom-4 w-24 h-24 bg-purple-500/5 rounded-full group-hover:scale-110 transition-transform duration-300">
    </div>
  </div>

  <!-- Refresh Button (Fixed at bottom right) -->
  <div class="flex justify-end pt-2">
    <button (click)="refreshStatistics()"
      class="group flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all duration-200"
      title="Refresh">
      <ion-icon name="refresh-outline"
        class="text-base group-hover:rotate-180 transition-transform duration-500"></ion-icon>
      <span>Refresh</span>
    </button>
  </div>
</div>
