<div class="bg-white rounded-[28px] p-6 h-full">
  <!-- Header -->
  <div class="flex flex-wrap items-start justify-between gap-2">
    <div>
      <h2 class="text-xl font-bold text-gray-900">Monthly Revenue</h2>
      <p class="mt-1 text-sm text-gray-500">Last 6 months</p>
    </div>

    <div class="text-right">
      <div class="text-3xl font-bold text-gray-900">{{ totalLabel }}</div>
      <span class="mt-1 inline-flex items-center gap-1 text-sm font-medium text-emerald-600">
        <ion-icon name="trending-up-outline" class="text-sm"></ion-icon>
        {{ growthLabel }}
      </span>
    </div>
  </div>

  <!-- Pill bar chart -->
  <div class="mt-6 flex items-end justify-around gap-2 min-h-[13rem] pt-8">
    <div *ngFor="let bar of bars; let i = index"
      class="flex h-full min-w-0 flex-1 flex-col items-center justify-end gap-2" (mouseenter)="onBarEnter(i)"
      (mouseleave)="onBarLeave()">
      <div class="relative flex h-44 w-full max-w-[2.75rem] items-end justify-center">
        <!-- Tooltip -->
        <div *ngIf="tooltipIndex() === i"
          class="absolute left-1/2 -translate-x-1/2 z-10 flex flex-col items-center pointer-events-none"
          [style.bottom.%]="barHeight(bar)">
          <span class="whitespace-nowrap rounded-full bg-gray-900 px-3 py-1.5 text-xs font-semibold text-white shadow-md">
            {{ tooltipLabel(bar) }}
          </span>
          <span class="mt-1 h-2 w-2 rounded-full bg-white ring-2 ring-gray-900"></span>
        </div>

        <!-- Bar -->
        <div class="w-full rounded-full revenue-bar" [ngClass]="'revenue-bar--' + bar.style"
          [style.height.%]="barHeight(bar)"></div>
      </div>

      <span class="text-sm text-gray-500">{{ bar.label }}</span>
    </div>
  </div>

  <!-- Paid / Pending / Overdue summary -->
  <div class="mt-6 flex flex-wrap items-center justify-around gap-4 border-t border-gray-100 pt-4">
    <div *ngFor="let item of summary" class="flex items-center gap-2">
      <span class="h-1.5 w-1.5 rounded-full" [ngClass]="item.dot"></span>
      <span class="text-sm text-gray-500">{{ item.label }}</span>
      <span class="text-sm font-bold text-gray-900">{{ item.amount }}</span>
    </div>
  </div>
</div>
