<div class="h-full flex flex-col">
  <!-- Header Stats -->
  <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-100">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
        <span class="text-sm font-medium text-gray-600">
          Total:
          <span class="text-blue-600 font-bold">{{totalTasks()}}</span>
        </span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-yellow-500 rounded-full"></div>
        <span class="text-sm font-medium text-gray-600">
          Pending:
          <span class="text-yellow-600 font-bold">{{pendingTasks().length}}</span>
        </span>
      </div>
      <div *ngIf="overdueTasks().length > 0" class="flex items-center gap-2">
        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        <span class="text-sm font-medium text-gray-600">
          Overdue:
          <span class="text-red-600 font-bold">{{overdueTasks().length}}</span>
        </span>
      </div>
    </div>
    <button (click)="openAddTask()"
      class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg text-sm font-medium transition-colors"
      aria-label="Add Task">
      <ion-icon name="add-outline" class="text-lg"></ion-icon>
      Add Task
    </button>
  </div>

  <!-- Filter Tabs -->
  <div class="flex items-center gap-2 mb-3">
    <button type="button" (click)="setFilter('all')"
      [class]="filter() === 'all'
        ? 'px-3 py-1.5 bg-blue-500 text-white rounded-lg text-xs font-semibold transition-all'
        : 'px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-200 transition-all'">
      All Tasks
    </button>
    <button type="button" (click)="setFilter('my')"
      [class]="filter() === 'my'
        ? 'px-3 py-1.5 bg-blue-500 text-white rounded-lg text-xs font-semibold transition-all'
        : 'px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-200 transition-all'">
      My Tasks
    </button>
    <button type="button" (click)="setFilter('overdue')"
      [class]="filter() === 'overdue'
        ? 'px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-semibold transition-all'
        : 'px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-200 transition-all'">
      Overdue
    </button>
  </div>

  <!-- Empty State -->
  <div *ngIf="visibleTasks().length === 0" class="flex-1 flex items-center justify-center py-8">
    <div class="text-center">
      <div class="w-16 h-16 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-3">
        <ion-icon name="checkbox-outline" class="text-3xl text-gray-400"></ion-icon>
      </div>
      <h4 class="text-lg font-semibold text-gray-800 mb-1">No Tasks</h4>
      <p class="text-sm text-gray-500">No tasks match this filter</p>
    </div>
  </div>

  <!-- Tasks List with Scroll -->
  <div *ngIf="visibleTasks().length > 0" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar max-h-[300px]">
    <div *ngFor="let task of visibleTasks(); trackBy: trackByTaskId" (click)="openEditTask(task)"
      class="group p-3 border-2 border-gray-100 rounded-xl hover:border-blue-200 hover:bg-blue-50/30 transition-all duration-200 cursor-pointer">
      <!-- Task Header -->
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex items-start gap-2 flex-1 min-w-0">
          <button type="button" (click)="toggleComplete(task.id, $event)"
            class="mt-0.5 flex-shrink-0 w-5 h-5 rounded-md border-2 flex items-center justify-center transition-colors"
            [class.border-gray-300]="!task.completed" [class.bg-white]="!task.completed"
            [class.border-green-500]="task.completed" [class.bg-green-500]="task.completed"
            [attr.aria-label]="task.completed ? 'Mark as incomplete' : 'Mark as complete'">
            <ion-icon *ngIf="task.completed" name="checkmark-outline" class="text-white text-sm"></ion-icon>
          </button>
          <div class="flex-1 min-w-0">
            <h4 class="text-sm font-semibold text-gray-800 truncate group-hover:text-blue-600 transition-colors">
              {{task.title}}
            </h4>
            <p *ngIf="task.clientName" class="text-xs text-gray-500 mt-0.5 flex items-center gap-1">
              <ion-icon name="person-outline" class="text-xs"></ion-icon>
              {{task.clientName}}
            </p>
          </div>
        </div>

        <!-- Priority Badge -->
        <div class="flex-shrink-0 flex items-center gap-1">
          <div class="flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium" [ngClass]="{
              'bg-red-100 text-red-700': task.priorityColor === '#DC2626' || task.priorityColor === '#EF4444',
              'bg-yellow-100 text-yellow-700': task.priorityColor === '#F59E0B',
              'bg-green-100 text-green-700': task.priorityColor === '#10B981'
            }">
            <ion-icon [name]="task.priorityIcon" class="text-xs"></ion-icon>
            <span>{{task.priorityLabel}}</span>
          </div>
          <button type="button" (click)="openEditTask(task); $event.stopPropagation()"
            class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-gray-100 rounded-lg transition-all"
            aria-label="Edit Task">
            <ion-icon name="create-outline" class="text-sm text-gray-500"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Task Info -->
      <div class="flex flex-wrap items-center gap-3 text-xs text-gray-600">
        <!-- Status -->
        <div class="flex items-center gap-1">
          <div class="w-2 h-2 rounded-full" [style.background-color]="task.statusColor"></div>
          <span class="font-medium">{{task.statusLabel}}</span>
        </div>

        <!-- Due Date -->
        <div class="flex items-center gap-1" [ngClass]="{'text-red-600 font-semibold': isOverdue(task.dueDate) && !task.completed}">
          <ion-icon name="calendar-outline" class="text-xs"></ion-icon>
          <span>{{formatDate(task.dueDate)}}</span>
          <ion-icon *ngIf="isOverdue(task.dueDate) && !task.completed" name="alert-circle" class="text-xs animate-pulse"></ion-icon>
        </div>

        <!-- Assignee -->
        <div class="flex items-center gap-1">
          <ion-icon name="person-circle-outline" class="text-xs"></ion-icon>
          <span>{{task.assigneeName}}</span>
        </div>

        <!-- Tags -->
        <div *ngIf="task.tags.length > 0" class="flex items-center gap-1 flex-wrap">
          <span *ngFor="let tag of task.tags" class="px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded text-[10px] font-medium">
            {{tag}}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Task Create/Edit Modal -->
<app-task-modal *ngIf="showTaskModal()" [task]="toTaskModalData(editingTask())" (close)="closeTaskModal()"
  (save)="handleTaskSave($event)"></app-task-modal>
