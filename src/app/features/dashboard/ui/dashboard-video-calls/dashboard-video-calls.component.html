<!-- Loading State (cosmetic refresh only) -->
<div *ngIf="isLoading()" class="flex items-center justify-center py-8">
  <div class="flex flex-col items-center gap-3">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
    <p class="text-sm text-gray-500">Loading...</p>
  </div>
</div>

<!-- Empty State -->
<div *ngIf="!isLoading() && calls().length === 0" class="text-center py-8">
  <ion-icon name="videocam-outline" class="text-4xl text-gray-300 mb-2"></ion-icon>
  <p class="text-sm text-gray-500">No recent calls</p>
</div>

<!-- Calls List -->
<div *ngIf="!isLoading() && calls().length > 0" class="space-y-2">
  <!-- Header con estadísticas -->
  <div class="flex items-center justify-between mb-3">
    <h4 class="text-sm font-medium text-gray-800">Recent Calls</h4>
    <div class="flex items-center gap-2">
      <span *ngIf="ongoingCallsCount() > 0"
        class="inline-flex items-center gap-1 text-xs bg-green-100 text-green-600 px-2 py-1 rounded-full">
        <span class="w-1.5 h-1.5 bg-green-600 rounded-full animate-pulse"></span>
        {{ ongoingCallsCount() }} live
      </span>
      <span *ngIf="todayCallsCount() > 0" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">
        {{ todayCallsCount() }} Today
      </span>
    </div>
  </div>

  <!-- Scrollable calls list -->
  <div class="calls-scroll-container">
    <div *ngFor="let callInfo of calls()" class="call-item group">

      <!-- Avatar -->
      <div class="relative flex-shrink-0">
        <div *ngIf="callInfo.photoUrl; else initialsAvatar" class="w-10 h-10 rounded-full bg-cover bg-center"
          [style.background-image]="'url(' + callInfo.photoUrl + ')'">
        </div>
        <ng-template #initialsAvatar>
          <div class="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-medium" [ngClass]="{
              'bg-red-500': callInfo.statusColor === 'red',
              'bg-green-500': callInfo.statusColor === 'green',
              'bg-gray-400': callInfo.statusColor === 'gray',
              'bg-blue-500': callInfo.statusColor === 'blue'
            }">
            {{ callInfo.initials }}
          </div>
        </ng-template>

        <!-- Status indicator -->
        <div *ngIf="callInfo.isOngoing"
          class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-500 border-2 border-white rounded-full animate-pulse">
        </div>
      </div>

      <!-- Call info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between mb-0.5">
          <p class="text-sm font-medium text-gray-800 truncate">
            {{ callInfo.displayName }}
          </p>
          <span class="text-xs text-gray-500 ml-2 flex-shrink-0">
            {{ callInfo.formattedTime }}
          </span>
        </div>

        <div class="flex items-center gap-2">
          <ion-icon [name]="callInfo.statusIcon + (callInfo.isOngoing ? '' : '-outline')" class="text-sm" [ngClass]="{
              'text-red-600': callInfo.statusColor === 'red',
              'text-green-600': callInfo.statusColor === 'green',
              'text-gray-400': callInfo.statusColor === 'gray',
              'text-blue-600': callInfo.statusColor === 'blue'
            }">
          </ion-icon>

          <span class="text-xs text-gray-500">
            <ng-container *ngIf="callInfo.status === 'ongoing'">
              In call
            </ng-container>
            <ng-container *ngIf="callInfo.status === 'completed'">
              {{ callInfo.formattedDuration }}
            </ng-container>
            <ng-container *ngIf="callInfo.status === 'upcoming'">
              Upcoming
            </ng-container>
            <ng-container *ngIf="callInfo.status === 'missed'">
              Missed
            </ng-container>
          </span>
        </div>
      </div>

      <!-- Action button -->
      <button class="action-button opacity-0 group-hover:opacity-100" [ngClass]="{
          'bg-red-100 text-red-600 hover:bg-red-200': callInfo.callType === 'video',
          'bg-green-100 text-green-600 hover:bg-green-200': callInfo.callType === 'audio'
        }">
        <ion-icon [name]="callInfo.callType === 'video' ? 'videocam' : 'call'" class="text-lg">
        </ion-icon>
      </button>
    </div>
  </div>

  <!-- Footer con refresh -->
  <div class="flex justify-center pt-2 border-t border-gray-100">
    <button (click)="refresh()"
      class="text-xs text-gray-500 hover:text-red-600 transition-colors flex items-center gap-1">
      <ion-icon name="refresh-outline" class="text-sm"></ion-icon>
      Refresh
    </button>
  </div>
</div>
