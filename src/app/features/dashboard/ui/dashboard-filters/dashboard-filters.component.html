<div class="space-y-6">
  <!-- Enhanced Filters Content -->
  <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
    <!-- Enhanced Preparers Selector - OWNERS ONLY -->
    <div *ngIf="isOwner" class="space-y-2">
      <label class="flex items-center gap-2 text-sm font-semibold text-gray-700">
        <div class="w-5 h-5 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center">
          <ion-icon name="people-outline" class="text-white text-xs"></ion-icon>
        </div>
        View Dashboard
      </label>
      <div class="relative group">
        <select [ngModel]="selectedClientId()" (ngModelChange)="onClientChange($event)"
          class="w-full appearance-none bg-white border-2 border-gray-200 hover:border-blue-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 rounded-2xl px-4 py-3.5 pr-12 text-sm font-medium text-gray-700 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer">
          <option value="" class="text-gray-500">My Dashboard</option>
          <option *ngFor="let user of filteredUsers()" [value]="user.id" class="text-gray-700">
            {{user.name || ''}} {{user.lastName || ''}}
          </option>
        </select>
        <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
          <ion-icon name="chevron-down-outline"
            class="w-5 h-5 text-gray-400 group-hover:text-blue-500 transition-colors duration-200"></ion-icon>
        </div>
      </div>
    </div>

    <!-- Indicator for Non-Owners - Static label only -->
    <div *ngIf="!isOwner" class="space-y-2">
      <label class="flex items-center gap-2 text-sm font-semibold text-gray-700">
        <div class="w-5 h-5 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center">
          <ion-icon name="person-outline" class="text-white text-xs"></ion-icon>
        </div>
        General Dashboard
      </label>
      <div class="relative group">
        <div
          class="w-full bg-white border-2 border-gray-200 rounded-2xl px-4 py-3.5 text-sm font-medium text-gray-700 shadow-sm flex items-center gap-2">
          <ion-icon name="home-outline" class="text-blue-600 text-lg"></ion-icon>
          <span>My Dashboard</span>
        </div>
      </div>
    </div>

    <!-- Enhanced Start Date Selector -->
    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm font-semibold text-gray-700">
        <div
          class="w-5 h-5 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center">
          <ion-icon name="calendar-outline" class="text-white text-xs"></ion-icon>
        </div>
        Start Date
      </label>
      <div class="relative group">
        <input type="date" [ngModel]="startDate()" (ngModelChange)="onStartDateChange($event)"
          class="w-full bg-white border-2 border-gray-200 hover:border-green-300 focus:border-green-500 focus:ring-4 focus:ring-green-100 rounded-2xl px-4 py-3.5 text-sm font-medium text-gray-700 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer">
      </div>
    </div>

    <!-- Enhanced End Date Selector -->
    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm font-semibold text-gray-700">
        <div
          class="w-5 h-5 rounded-full bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center">
          <ion-icon name="calendar-outline" class="text-white text-xs"></ion-icon>
        </div>
        End Date
      </label>
      <div class="relative group">
        <input type="date" [ngModel]="endDate()" (ngModelChange)="onEndDateChange($event)"
          class="w-full bg-white border-2 border-gray-200 hover:border-purple-300 focus:border-purple-500 focus:ring-4 focus:ring-purple-100 rounded-2xl px-4 py-3.5 text-sm font-medium text-gray-700 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer">
      </div>
    </div>

    <!-- Enhanced Apply Button -->
    <div class="flex items-end">
      <button (click)="applyFilters()"
        class="group w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 hover:from-blue-600 hover:via-indigo-600 hover:to-purple-700 text-white px-6 py-3.5 rounded-2xl font-bold transition-all duration-300 transform hover:scale-105 hover:shadow-xl shadow-lg flex items-center justify-center gap-3 relative overflow-hidden">
        <div
          class="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 transform skew-x-12 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700">
        </div>
        <ion-icon name="search-outline"
          class="text-xl transition-transform duration-200 group-hover:rotate-12 relative z-10"></ion-icon>
        <span class="relative z-10">Search</span>
      </button>
    </div>
  </div>

  <!-- Enhanced Active Filter Chips -->
  <div *ngIf="hasActiveFilters()" class="space-y-3">
    <div class="flex items-center gap-2">
      <span class="text-sm font-semibold text-gray-600">Applied filters:</span>
      <div class="flex-1 h-px bg-gradient-to-r from-gray-200 to-transparent"></div>
      <button (click)="clearAllFilters()"
        class="group flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-500 hover:text-red-600 hover:bg-red-50 border-2 border-transparent hover:border-red-200 rounded-xl transition-all duration-300 transform hover:scale-105">
        <ion-icon name="refresh-outline"
          class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500"></ion-icon>
        <span>Reset filters</span>
      </button>
    </div>

    <div class="flex flex-wrap gap-3">
      <!-- Only show preparer chip when Owner -->
      <div *ngIf="selectedClientId() && isOwner"
        class="group flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-blue-50 to-blue-100 hover:from-blue-100 hover:to-blue-200 text-blue-700 border-2 border-blue-200 hover:border-blue-300 rounded-full text-sm font-semibold shadow-sm hover:shadow-md transition-all duration-300 transform hover:scale-105">
        <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
        <span>{{getSelectedClientName()}}</span>
        <button (click)="clearClientFilter()"
          class="ml-1 text-blue-600 hover:text-blue-800 hover:bg-blue-200 rounded-full p-1 transition-all duration-200 transform hover:scale-110">
          <ion-icon name="close-outline" class="w-3 h-3"></ion-icon>
        </button>
      </div>

      <div *ngIf="startDate()"
        class="group flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-green-50 to-green-100 hover:from-green-100 hover:to-green-200 text-green-700 border-2 border-green-200 hover:border-green-300 rounded-full text-sm font-semibold shadow-sm hover:shadow-md transition-all duration-300 transform hover:scale-105">
        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        <span>Start Date: {{formatDate(startDate())}}</span>
        <button (click)="clearStartDateFilter()"
          class="ml-1 text-green-600 hover:text-green-800 hover:bg-green-200 rounded-full p-1 transition-all duration-200 transform hover:scale-110">
          <ion-icon name="close-outline" class="w-3 h-3"></ion-icon>
        </button>
      </div>

      <div *ngIf="endDate()"
        class="group flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-purple-50 to-purple-100 hover:from-purple-100 hover:to-purple-200 text-purple-700 border-2 border-purple-200 hover:border-purple-300 rounded-full text-sm font-semibold shadow-sm hover:shadow-md transition-all duration-300 transform hover:scale-105">
        <div class="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></div>
        <span>End Date: {{formatDate(endDate())}}</span>
        <button (click)="clearEndDateFilter()"
          class="ml-1 text-purple-600 hover:text-purple-800 hover:bg-purple-200 rounded-full p-1 transition-all duration-200 transform hover:scale-110">
          <ion-icon name="close-outline" class="w-3 h-3"></ion-icon>
        </button>
      </div>
    </div>
  </div>
</div>
