<div class="min-h-full pt-3 pb-1 grid grid-cols-1 lg:grid-cols-4 gap-6">
  <!-- Recent conversations rail -->
  <div class="bg-white rounded-[28px] p-5 lg:col-span-1">
    <h2 class="text-sm font-bold text-gray-900 px-1">Recent conversations</h2>
    <div class="mt-3 flex flex-col gap-1">
      <button *ngFor="let conv of conversations()" type="button" (click)="selectConversation(conv.id)"
        class="rounded-2xl px-3 py-2.5 text-left transition-colors"
        [ngClass]="conv.id === activeConversationId() ? 'bg-gray-900 text-white' : 'hover:bg-gray-50 text-gray-700'">
        <span class="block text-sm font-medium truncate">{{ conv.title }}</span>
        <span class="block text-xs truncate"
          [ngClass]="conv.id === activeConversationId() ? 'text-gray-300' : 'text-gray-400'">{{ conv.preview }}</span>
      </button>
    </div>
  </div>

  <!-- Chat card -->
  <div class="bg-white rounded-[28px] p-6 lg:col-span-3 flex flex-col min-h-[32rem]">
    <!-- Chat header -->
    <div class="flex items-center gap-3 pb-4 border-b border-gray-100">
      <span class="flex h-10 w-10 items-center justify-center rounded-full bg-[#7C6AE0] text-white">
        <ion-icon name="sparkles-outline" class="text-lg"></ion-icon>
      </span>
      <div>
        <h2 class="text-base font-bold text-gray-900">TaxVision AI</h2>
        <span class="flex items-center gap-1.5 text-xs text-emerald-600">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
          Online
        </span>
      </div>

      <button type="button" (click)="startNewChat()"
        class="ml-auto flex items-center gap-2 rounded-full border border-gray-200 px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
        <ion-icon name="add-outline" class="text-base text-gray-500"></ion-icon>
        New chat
      </button>
    </div>

    <!-- Thread -->
    <div class="flex-1 overflow-y-auto py-4">
      <app-ai-chat-thread [messages]="activeConversation.messages" [isTyping]="isTyping()"></app-ai-chat-thread>

      <div *ngIf="activeConversation.messages.length === 0 && !isTyping()" class="flex h-full flex-col items-center justify-center text-center py-10">
        <span class="flex h-12 w-12 items-center justify-center rounded-full bg-[#EEEBFA]">
          <ion-icon name="sparkles-outline" class="text-xl text-[#7C6AE0]"></ion-icon>
        </span>
        <p class="mt-3 text-sm font-medium text-gray-600">Ask me anything about your clients or filings</p>
      </div>
    </div>

    <!-- Composer -->
    <div class="pt-4 border-t border-gray-100">
      <app-ai-chat-composer [disabled]="isTyping()" [showSuggestions]="activeConversation.messages.length === 0"
        (send)="sendMessage($event)"></app-ai-chat-composer>
    </div>
  </div>
</div>
