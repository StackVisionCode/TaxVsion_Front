<div class="min-h-full pt-3 pb-1 flex flex-col gap-6">
  <ng-container *ngIf="!activeRoomMeeting(); else roomView">
    <!-- Stats row -->
    <div class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(170px,1fr))]">
      <div class="rounded-[24px] bg-[#F2E3C9] p-5">
        <p class="text-sm text-gray-600">Today's meetings</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ todayCount() }}</p>
      </div>
      <div class="rounded-[24px] bg-[#CBD9F2] p-5">
        <p class="text-sm text-gray-600">This week</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ thisWeekCount() }}</p>
      </div>
      <div class="rounded-[24px] bg-[#DCDCDC] p-5">
        <p class="text-sm text-gray-600">Avg. participants</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ avgParticipants() }}</p>
      </div>
      <div class="rounded-[24px] bg-[#EEEBFA] p-5">
        <p class="text-sm text-gray-600">Recordings available</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ recordingsCount() }}</p>
      </div>
    </div>

    <!-- Agenda card -->
    <div class="bg-white rounded-[28px] p-6">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <h2 class="text-xl font-bold text-gray-900">Meetings</h2>
          <p class="mt-1 text-sm text-gray-500">Your schedule at a glance</p>
        </div>
        <button type="button" (click)="openSchedulePanel()"
          class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
          <ion-icon name="add-outline" class="text-base"></ion-icon>
          Schedule meeting
        </button>
      </div>

      <!-- Tabs + search -->
      <div class="mt-4 flex flex-wrap items-center gap-2">
        <button type="button" (click)="setTab('upcoming')"
          class="rounded-full px-4 py-2 text-sm font-medium transition-colors"
          [ngClass]="activeTab() === 'upcoming' ? 'bg-gray-900 text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-100'">
          Upcoming
        </button>
        <button type="button" (click)="setTab('past')"
          class="rounded-full px-4 py-2 text-sm font-medium transition-colors"
          [ngClass]="activeTab() === 'past' ? 'bg-gray-900 text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-100'">
          Past
        </button>

        <div class="ml-auto h-10 flex items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <ion-icon name="search-outline" class="mr-2 text-base text-gray-400"></ion-icon>
          <input type="text" placeholder="Search meetings or clients" [ngModel]="search()"
            (ngModelChange)="search.set($event)"
            class="h-full w-48 bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>
      </div>

      <!-- List -->
      <div class="mt-5">
        <app-meeting-list [meetings]="visibleMeetings()" (edit)="openEditPanel($event)"
          (cancel)="cancelMeeting($event)" (join)="joinMeeting($event)"></app-meeting-list>
      </div>
    </div>
  </ng-container>

  <ng-template #roomView>
    <app-meeting-room-preview [meeting]="activeRoomMeeting()" (left)="leaveMeeting()"></app-meeting-room-preview>
  </ng-template>
</div>

<!-- Schedule / edit overlay -->
<app-meeting-schedule-panel [isOpen]="isPanelOpen()" [meeting]="editingMeeting()" (closed)="closePanel()"
  (saved)="handleSaved($event)"></app-meeting-schedule-panel>
