<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4" (click)="close()">
  <div class="w-full max-w-md rounded-[28px] bg-white p-6 shadow-xl" (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h2 class="text-xl font-bold text-gray-900">{{ isEditMode() ? 'Edit Meeting' : 'Schedule Meeting' }}</h2>
        <p class="mt-1 text-sm text-gray-500">
          {{ isEditMode() ? 'Update the details of this meeting' : 'Set up a new meeting on your calendar' }}
        </p>
      </div>
      <button type="button" (click)="close()" class="text-gray-400 hover:text-gray-700" aria-label="Close">
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>

    <div class="mt-4 flex flex-col gap-3">
      <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Meeting title" [ngModel]="title()" (ngModelChange)="title.set($event)"
          class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
      </div>

      <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Client" [ngModel]="client()" (ngModelChange)="client.set($event)"
          class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
      </div>

      <div class="flex gap-3">
        <div class="h-10 flex-1 rounded-full border border-gray-200 bg-white flex items-center focus-within:border-gray-300 transition-colors">
          <input type="date" [ngModel]="date()" (ngModelChange)="date.set($event)"
            class="w-full h-full bg-transparent px-4 text-sm text-gray-700 rounded-full focus:outline-none" />
        </div>
        <div class="h-10 flex-1 rounded-full border border-gray-200 bg-white flex items-center focus-within:border-gray-300 transition-colors">
          <input type="time" [ngModel]="time()" (ngModelChange)="time.set($event)"
            class="w-full h-full bg-transparent px-4 text-sm text-gray-700 rounded-full focus:outline-none" />
        </div>
      </div>

      <!-- Duration dropdown -->
      <div class="relative" data-dropdown="meeting-duration">
        <button type="button" (click)="toggleDurationDropdown()"
          class="flex h-10 w-full items-center justify-between gap-2 rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
          {{ duration() }} minutes
          <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
        </button>

        <div *ngIf="isDurationOpen()"
          class="absolute left-0 right-0 top-full z-20 mt-2 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
          <button *ngFor="let option of durations" type="button" (click)="selectDuration(option)"
            class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            {{ option }} minutes
            <ion-icon *ngIf="option === duration()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Participants -->
      <div>
        <div class="h-10 rounded-full border border-gray-200 bg-white flex items-center focus-within:border-gray-300 transition-colors">
          <input type="text" placeholder="Add participant, press Enter" [ngModel]="participantDraft()"
            (ngModelChange)="participantDraft.set($event)" (keydown.enter)="addParticipant()"
            class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
        </div>

        <div *ngIf="participants().length > 0" class="mt-2 flex flex-wrap gap-2">
          <span *ngFor="let participant of participants(); let i = index"
            class="flex items-center gap-2 rounded-full border border-gray-200 pl-1 pr-3 py-1 text-xs font-medium text-gray-700">
            <span class="flex h-6 w-6 items-center justify-center rounded-full text-[10px] font-semibold text-white"
              [ngClass]="participant.color">{{ participant.initials }}</span>
            {{ participant.name }}
            <button type="button" (click)="removeParticipant(i)" class="text-gray-400 hover:text-gray-700"
              aria-label="Remove participant">
              <ion-icon name="close-outline" class="text-sm"></ion-icon>
            </button>
          </span>
        </div>
      </div>

      <textarea rows="3" placeholder="Notes (optional)" [ngModel]="notes()" (ngModelChange)="notes.set($event)"
        class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-300 transition-colors resize-none"></textarea>
    </div>

    <div class="mt-5 flex items-center justify-end gap-2">
      <button type="button" (click)="close()"
        class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="save()" [disabled]="!canSave()"
        class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        {{ isEditMode() ? 'Save changes' : 'Schedule meeting' }}
      </button>
    </div>
  </div>
</div>
