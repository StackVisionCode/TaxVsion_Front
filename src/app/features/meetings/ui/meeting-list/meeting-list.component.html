<div class="flex flex-col gap-3">
  <div *ngIf="meetings.length === 0" class="rounded-2xl border border-gray-100 p-8 text-center text-sm text-gray-500">
    No meetings found.
  </div>

  <div *ngFor="let meeting of meetings; trackBy: trackByMeetingId" (click)="onRowClick(meeting)"
    class="cursor-pointer rounded-2xl border border-gray-100 p-4 hover:bg-gray-50 transition-colors">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div class="min-w-0 flex-1">
        <div class="flex flex-wrap items-center gap-2">
          <p class="truncate text-sm font-semibold text-gray-900">{{ meeting.title }}</p>
          <span class="flex items-center rounded-full border px-2.5 py-0.5 text-xs font-medium"
            [ngClass]="{
              'border-indigo-200 text-indigo-600': meeting.status === 'upcoming',
              'border-emerald-200 text-emerald-600': meeting.status === 'live',
              'border-gray-200 text-gray-500': meeting.status === 'ended',
              'border-red-200 text-red-500': meeting.status === 'cancelled'
            }">
            <span *ngIf="meeting.status === 'live'"
              class="mr-1.5 h-1.5 w-1.5 rounded-full bg-emerald-600 animate-pulse"></span>
            {{ statusLabel(meeting.status) }}
          </span>
        </div>
        <p class="mt-1 text-sm text-gray-500">{{ meeting.client }}</p>
        <div class="mt-2 flex flex-wrap items-center gap-3 text-xs text-gray-500">
          <span class="flex items-center gap-1">
            <ion-icon name="calendar-outline" class="text-sm"></ion-icon>
            {{ formatDateTime(meeting.scheduledAt) }}
          </span>
          <span class="flex items-center gap-1">
            <ion-icon name="time-outline" class="text-sm"></ion-icon>
            {{ formatDuration(meeting.durationMinutes) }}
          </span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Participant avatars -->
        <div class="flex -space-x-2">
          <span *ngFor="let participant of visibleParticipants(meeting)"
            class="flex h-8 w-8 items-center justify-center rounded-full border-2 border-white text-[10px] font-semibold text-white"
            [ngClass]="participant.color" [title]="participant.name">
            {{ participant.initials }}
          </span>
          <span *ngIf="extraParticipantsCount(meeting) > 0"
            class="flex h-8 w-8 items-center justify-center rounded-full border-2 border-white bg-gray-200 text-[10px] font-semibold text-gray-600">
            +{{ extraParticipantsCount(meeting) }}
          </span>
        </div>

        <button *ngIf="meeting.status === 'upcoming' || meeting.status === 'live'" type="button"
          (click)="onJoinClick(meeting, $event)"
          class="rounded-full bg-gray-900 px-4 py-2 text-xs font-semibold text-white hover:bg-gray-700 transition-colors">
          Join
        </button>

        <button *ngIf="meeting.status === 'ended' && meeting.hasRecording" type="button"
          class="rounded-full border border-gray-200 px-4 py-2 text-xs font-semibold text-gray-700 hover:bg-gray-100 transition-colors">
          View recording
        </button>

        <div class="relative" data-dropdown="meeting-menu">
          <button type="button" (click)="toggleMenu(meeting, $event)"
            class="flex h-9 w-9 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors"
            aria-label="Meeting options">
            <ion-icon name="ellipsis-horizontal-outline" class="text-base"></ion-icon>
          </button>
          <div *ngIf="openMenuId() === meeting.id"
            class="absolute right-0 top-full z-20 mt-2 w-40 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
            <button type="button" (click)="onEditClick(meeting, $event)"
              class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              <ion-icon name="create-outline" class="text-base"></ion-icon>
              Edit
            </button>
            <button type="button" (click)="onCancelClick(meeting, $event)"
              class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-red-500 hover:bg-gray-50 transition-colors">
              <ion-icon name="close-circle-outline" class="text-base"></ion-icon>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
