<div class="grid gap-4 grid-cols-[repeat(auto-fill,minmax(240px,1fr))]">
  <div *ngFor="let template of templates; trackBy: trackByTemplateId" (click)="onPreviewClick(template)"
    class="group cursor-pointer rounded-2xl border border-gray-100 p-4 hover:border-gray-200 hover:shadow-sm transition">
    <div class="flex items-start justify-between">
      <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full"
        [ngClass]="categoryCircle(template.category)">
        <ion-icon [name]="categoryIcon(template.category)" class="text-lg text-gray-700"></ion-icon>
      </span>

      <div class="relative" data-dropdown="template-menu" (click)="onMenuClick($event)">
        <button type="button" (click)="toggleMenu(template, $event)"
          class="flex h-8 w-8 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors"
          aria-label="Template options">
          <ion-icon name="ellipsis-horizontal-outline" class="text-base"></ion-icon>
        </button>
        <div *ngIf="openMenuId() === template.id"
          class="absolute right-0 top-full z-20 mt-2 w-40 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
          <button type="button" (click)="onEditClick(template, $event)"
            class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            <ion-icon name="create-outline" class="text-base"></ion-icon>
            Edit
          </button>
          <button type="button" (click)="onDuplicateClick(template, $event)"
            class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            <ion-icon name="copy-outline" class="text-base"></ion-icon>
            Duplicate
          </button>
          <button type="button" (click)="onDeleteClick(template, $event)"
            class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-red-500 hover:bg-gray-50 transition-colors">
            <ion-icon name="trash-outline" class="text-base"></ion-icon>
            Delete
          </button>
        </div>
      </div>
    </div>

    <p class="mt-3 text-sm font-semibold text-gray-900 truncate">{{ template.name }}</p>

    <div class="mt-2 flex flex-wrap items-center gap-1.5">
      <span class="inline-block rounded-full border px-2.5 py-0.5 text-xs font-medium"
        [ngClass]="categoryChip(template.category)">
        {{ template.category }}
      </span>
      <span class="inline-flex items-center gap-1.5 rounded-full border px-2.5 py-0.5 text-xs font-medium"
        [ngClass]="statusChip(template.status)">
        <span class="h-1.5 w-1.5 rounded-full" [ngClass]="template.status === 'published' ? 'bg-emerald-500' : 'bg-gray-400'"></span>
        {{ statusLabel(template.status) }}
      </span>
    </div>

    <p class="mt-3 text-xs text-gray-400">Updated {{ formatDate(template.updatedAt) }}</p>
  </div>
</div>

<div *ngIf="templates.length === 0" class="px-4 py-10 text-center">
  <ion-icon name="search-outline" class="text-3xl text-gray-300"></ion-icon>
  <p class="mt-2 text-sm text-gray-500">No templates match your search</p>
</div>
