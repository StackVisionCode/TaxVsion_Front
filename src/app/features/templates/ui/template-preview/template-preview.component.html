<div class="bg-white rounded-[28px] p-6" *ngIf="template as tpl">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <button type="button" (click)="goBack()"
        class="-ml-3 flex items-center gap-1 rounded-full px-3 py-1.5 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        <ion-icon name="arrow-back-outline" class="text-base"></ion-icon>
        Back to templates
      </button>
      <h2 class="mt-3 text-2xl font-bold text-gray-900">{{ tpl.name }}</h2>
      <div class="mt-2 flex flex-wrap items-center gap-2">
        <span class="inline-block rounded-full border px-3 py-0.5 text-xs font-medium" [ngClass]="categoryChip(tpl.category)">
          {{ tpl.category }}
        </span>
        <span class="inline-flex items-center gap-2 rounded-full border px-3 py-0.5 text-xs font-medium" [ngClass]="statusChip(tpl.status)">
          <span class="h-1.5 w-1.5 rounded-full" [ngClass]="statusDot(tpl.status)"></span>
          {{ statusLabel(tpl.status) }}
        </span>
      </div>
      <p class="mt-2 flex items-center gap-1 text-sm text-gray-500">
        <ion-icon name="time-outline" class="text-sm"></ion-icon>
        Updated {{ formatDate(tpl.updatedAt) }}
      </p>
    </div>

    <div class="flex items-center gap-2">
      <button type="button" (click)="duplicate(tpl)"
        class="flex items-center gap-2 rounded-full border border-gray-200 px-5 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
        <ion-icon name="copy-outline" class="text-base"></ion-icon>
        Duplicate
      </button>
      <button type="button" (click)="edit(tpl)"
        class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
        <ion-icon name="create-outline" class="text-base"></ion-icon>
        Edit
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="mt-6 rounded-2xl border border-gray-100 bg-[#FAF9F7] p-5">
    <p class="text-xs font-semibold uppercase tracking-wide text-gray-400">Body</p>
    <p class="mt-2 whitespace-pre-line text-sm leading-relaxed text-gray-700">{{ tpl.body }}</p>
  </div>
</div>
