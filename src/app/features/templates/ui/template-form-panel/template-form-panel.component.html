<app-modal [isOpen]="isOpen" [heading]="isEditMode() ? 'Edit template' : 'New template'"
  [subheading]="isEditMode() ? 'Update the details of this template' : 'Add a reusable template to your library'"
  size="lg" (closed)="close()">

    <div class="mt-5 flex flex-col gap-3">
      <!-- Name -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Template name" [ngModel]="name()" name="name"
          (ngModelChange)="name.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <!-- Category dropdown -->
        <div class="relative" data-dropdown="template-category">
          <button type="button" (click)="toggleCategoryDropdown()"
            class="flex h-11 w-full items-center justify-between rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
            <span>{{ category() }}</span>
            <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
          </button>
          <div *ngIf="isCategoryOpen()"
            class="absolute left-0 top-full z-20 mt-2 w-full overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
            <button *ngFor="let option of categories" type="button" (click)="selectCategory(option)"
              class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              {{ option }}
              <ion-icon *ngIf="option === category()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Status toggle -->
        <div class="flex items-center rounded-full border border-gray-200 p-1">
          <button type="button" (click)="setStatus('draft')"
            class="flex h-9 flex-1 items-center justify-center rounded-full text-sm font-medium transition-colors"
            [ngClass]="status() === 'draft' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
            Draft
          </button>
          <button type="button" (click)="setStatus('published')"
            class="flex h-9 flex-1 items-center justify-center rounded-full text-sm font-medium transition-colors"
            [ngClass]="status() === 'published' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
            Published
          </button>
        </div>
      </div>

      <!-- Body -->
      <div>
        <textarea rows="8" placeholder="Write the template content..." [ngModel]="body()" name="body"
          (ngModelChange)="body.set($event)"
          class="w-full resize-none rounded-2xl border border-gray-100 bg-[#FAF9F7] p-4 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-300 transition-colors"></textarea>
        <p class="mt-2 text-xs text-gray-400">
          Use <span class="font-medium text-gray-500">{{ '{{client_name}}' }}</span>,
          <span class="font-medium text-gray-500">{{ '{{date}}' }}</span> as placeholders.
        </p>
      </div>
    </div>

  <div class="mt-5 flex items-center justify-end gap-2">
    <button type="button" (click)="close()"
      class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      Cancel
    </button>
    <button type="button" (click)="save()" [disabled]="!canSave()"
      class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
      {{ isEditMode() ? 'Save changes' : 'Create template' }}
    </button>
  </div>
</app-modal>
