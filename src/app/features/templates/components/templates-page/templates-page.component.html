<div class="min-h-full pt-3 pb-1 flex flex-col gap-6">
  <ng-container *ngIf="!previewTemplate(); else previewView">
    <a routerLink="/settings"
      class="-ml-3 flex w-fit items-center gap-1 rounded-full px-3 py-1.5 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      <ion-icon name="arrow-back-outline" class="text-base"></ion-icon>
      Back to settings
    </a>

    <!-- Stats row -->
    <div class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(170px,1fr))]">
      <div class="rounded-[24px] bg-[#F2E3C9] p-5">
        <p class="text-sm text-gray-600">Total templates</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ totalCount() }}</p>
      </div>
      <div class="rounded-[24px] bg-[#CBD9F2] p-5">
        <p class="text-sm text-gray-600">Published</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ publishedCount() }}</p>
      </div>
      <div class="rounded-[24px] bg-[#DCDCDC] p-5">
        <p class="text-sm text-gray-600">Drafts</p>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ draftCount() }}</p>
      </div>
    </div>

    <!-- Templates card -->
    <div class="bg-white rounded-[28px] p-6">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <h2 class="text-xl font-bold text-gray-900">Templates</h2>
          <p class="mt-1 text-sm text-gray-500">Reusable email, letter and reminder content for your firm</p>
        </div>
        <button type="button" (click)="openCreatePanel()"
          class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
          <ion-icon name="add-outline" class="text-base"></ion-icon>
          New template
        </button>
      </div>

      <!-- Filter bar -->
      <div class="mt-4 flex flex-wrap items-center gap-2">
        <button *ngFor="let filter of categoryFilters" type="button" (click)="setCategoryFilter(filter)"
          class="rounded-full px-4 py-2 text-sm font-medium transition-colors"
          [ngClass]="categoryFilter() === filter ? 'bg-gray-900 text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-100'">
          {{ filter }}
        </button>

        <div
          class="ml-auto flex h-10 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <ion-icon name="search-outline" class="mr-2 text-base text-gray-400"></ion-icon>
          <input type="text" placeholder="Search templates" [ngModel]="search()" name="search"
            (ngModelChange)="search.set($event)"
            class="h-full w-48 bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>
      </div>

      <!-- Grid -->
      <div class="mt-5">
        <app-template-card-grid [templates]="visibleTemplates()" (previewRequested)="openPreview($event)"
          (editRequested)="openEditPanel($event)" (duplicateRequested)="duplicateTemplate($event)"
          (deleteRequested)="deleteTemplate($event)"></app-template-card-grid>
      </div>
    </div>
  </ng-container>

  <ng-template #previewView>
    <app-template-preview [template]="previewTemplate()" (back)="closePreview()"
      (duplicateRequested)="duplicateTemplate($event)" (editRequested)="editFromPreview($event)"></app-template-preview>
  </ng-template>
</div>

<!-- Create / edit overlay -->
<app-template-form-panel [isOpen]="isPanelOpen()" [template]="editingTemplate()" (closed)="closePanel()"
  (saved)="handleSaved($event)"></app-template-form-panel>

<!-- Delete confirmation -->
<app-confirm-dialog [isOpen]="!!pendingDelete()" heading="Delete template?" [message]="deleteMessage()"
  (confirmed)="confirmDelete()" (cancelled)="pendingDelete.set(null)"></app-confirm-dialog>
