<div class="bg-white rounded-[28px] p-6">
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold text-gray-900">{{ moduleTitle }}</h2>
      <p class="mt-1 text-sm text-gray-500">Settings that apply to this module</p>
    </div>

    <span *ngIf="showSaved()"
      class="flex items-center gap-2 rounded-full border border-emerald-200 px-3 py-1.5 text-xs font-medium text-emerald-600">
      <ion-icon name="checkmark-circle-outline" class="text-sm"></ion-icon>
      Saved
    </span>
  </div>

  <div class="mt-4 flex flex-col divide-y divide-gray-100">
    <div *ngFor="let field of fields()" class="flex flex-wrap items-center justify-between gap-3 py-4">
      <div class="min-w-0">
        <p class="text-sm font-semibold text-gray-900">{{ field.label }}</p>
        <p class="mt-0.5 text-xs text-gray-400">{{ field.description }}</p>
      </div>

      <!-- Toggle -->
      <button *ngIf="field.kind === 'toggle'" type="button" (click)="toggleField(field.key)"
        class="relative h-6 w-11 shrink-0 rounded-full transition-colors"
        [ngClass]="field.value ? 'bg-gray-900' : 'bg-gray-200'"
        [attr.aria-pressed]="field.value">
        <span class="absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-transform"
          [ngClass]="field.value ? 'translate-x-5' : 'translate-x-0.5'"></span>
      </button>

      <!-- Select dropdown -->
      <div *ngIf="field.kind === 'select'" class="relative" [attr.data-dropdown-field]="field.key">
        <button type="button" (click)="toggleDropdown(field.key)"
          class="flex items-center gap-2 rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
          {{ field.value }}
          <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
        </button>

        <div *ngIf="openDropdownKey() === field.key"
          class="absolute right-0 top-full z-20 mt-2 w-48 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
          <button *ngFor="let option of field.options" type="button" (click)="selectOption(field.key, option)"
            class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            {{ option }}
            <ion-icon *ngIf="option === field.value" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Text input -->
      <div *ngIf="field.kind === 'text'" class="h-9 w-64 rounded-full border border-gray-200 bg-white flex items-center focus-within:border-gray-300 transition-colors">
        <input type="text" [ngModel]="field.value" (ngModelChange)="updateText(field.key, $event)"
          class="w-full h-full bg-transparent px-4 text-sm text-gray-700 rounded-full focus:outline-none" />
      </div>
    </div>
  </div>

  <div class="mt-4">
    <button type="button" (click)="save()"
      class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
      Save changes
    </button>
  </div>
</div>
