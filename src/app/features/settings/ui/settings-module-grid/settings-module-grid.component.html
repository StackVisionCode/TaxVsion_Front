<div class="bg-white rounded-[28px] p-6">
  <h2 class="text-xl font-bold text-gray-900">Settings</h2>
  <p class="mt-1 text-sm text-gray-500">Configure how each module behaves for your firm</p>

  <div class="mt-4 grid gap-3 grid-cols-[repeat(auto-fill,minmax(160px,1fr))]">
    <ng-container *ngFor="let module of modules">
      <!-- Módulo con ruta propia (ej. Storage): navega en vez de seleccionar un panel local. -->
      <a *ngIf="module.routerLink; else localModule" [routerLink]="module.routerLink"
        class="group relative rounded-2xl border border-gray-100 p-4 text-left transition-colors hover:bg-gray-50">
        <ion-icon name="arrow-forward-outline"
          class="absolute right-3 top-3 text-sm text-gray-300 transition-colors group-hover:text-gray-500"></ion-icon>
        <span class="flex h-10 w-10 items-center justify-center rounded-full" [ngClass]="module.circleClass">
          <ion-icon [name]="module.icon" class="text-lg"></ion-icon>
        </span>
        <p class="mt-3 text-sm font-bold text-gray-900">{{ module.title }}</p>
        <p class="mt-0.5 text-xs text-gray-400 leading-snug">{{ module.description }}</p>
      </a>

      <ng-template #localModule>
        <button type="button" (click)="moduleSelected.emit(module.id)"
          class="rounded-2xl border p-4 text-left transition-colors"
          [ngClass]="module.id === selectedId ? 'border-gray-900' : 'border-gray-100 hover:bg-gray-50'">
          <span class="flex h-10 w-10 items-center justify-center rounded-full" [ngClass]="module.circleClass">
            <ion-icon [name]="module.icon" class="text-lg"></ion-icon>
          </span>
          <p class="mt-3 text-sm font-bold text-gray-900">{{ module.title }}</p>
          <p class="mt-0.5 text-xs text-gray-400 leading-snug">{{ module.description }}</p>
        </button>
      </ng-template>
    </ng-container>
  </div>
</div>
