<div class="overflow-x-auto">
  <table class="w-full min-w-[760px] border-separate border-spacing-0 text-sm">
    <thead>
      <tr>
        <th class="rounded-l-2xl bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Invoice #</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Client</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Issue date</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Due date</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-right font-semibold text-gray-900">Amount</th>
        <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Status</th>
        <th class="rounded-r-2xl bg-[#FAF9F7] px-4 py-3"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let invoice of invoices; trackBy: trackByInvoiceId; let last = last" (click)="onRowClick(invoice)"
        class="group cursor-pointer">
        <td class="rounded-l-2xl px-4 py-3.5 font-medium text-gray-900 transition-colors group-hover:bg-gray-50"
          [class.border-b]="!last" [class.border-gray-100]="!last">
          {{ invoice.invoiceNumber }}
        </td>
        <td class="px-4 py-3.5 text-gray-700 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          {{ invoice.client }}
        </td>
        <td class="px-4 py-3.5 text-gray-500 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          {{ formatDate(invoice.issueDate) }}
        </td>
        <td class="px-4 py-3.5 text-gray-500 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          {{ formatDate(invoice.dueDate) }}
        </td>
        <td class="px-4 py-3.5 text-right font-bold text-gray-900 transition-colors group-hover:bg-gray-50"
          [class.border-b]="!last" [class.border-gray-100]="!last">
          {{ formatCurrency(total(invoice)) }}
        </td>
        <td class="px-4 py-3.5 transition-colors group-hover:bg-gray-50" [class.border-b]="!last"
          [class.border-gray-100]="!last">
          <span class="inline-flex items-center gap-2 rounded-full border px-3 py-0.5 text-xs font-medium"
            [ngClass]="statusChip(invoice.status)">
            <span class="h-1.5 w-1.5 rounded-full" [ngClass]="statusDot(invoice.status)"></span>
            {{ statusLabel(invoice.status) }}
          </span>
        </td>
        <td class="rounded-r-2xl px-4 py-3.5 text-right transition-colors group-hover:bg-gray-50"
          [class.border-b]="!last" [class.border-gray-100]="!last">
          <div class="relative inline-block text-left" data-dropdown="invoice-menu">
            <button type="button" (click)="toggleMenu(invoice, $event)"
              class="flex h-8 w-8 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors"
              aria-label="Invoice options">
              <ion-icon name="ellipsis-horizontal-outline" class="text-base"></ion-icon>
            </button>
            <div *ngIf="openMenuId() === invoice.id"
              class="absolute right-0 top-full z-20 mt-2 w-44 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
              <button type="button" (click)="onEditClick(invoice, $event)"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <ion-icon name="create-outline" class="text-base"></ion-icon>
                Edit
              </button>
              <button type="button" (click)="onMarkPaidClick(invoice, $event)"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <ion-icon name="checkmark-circle-outline" class="text-base"></ion-icon>
                Mark as paid
              </button>
              <button type="button" (click)="onDeleteClick(invoice, $event)"
                class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-red-500 hover:bg-gray-50 transition-colors">
                <ion-icon name="trash-outline" class="text-base"></ion-icon>
                Delete
              </button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="invoices.length === 0" class="px-4 py-10 text-center">
    <ion-icon name="document-text-outline" class="text-3xl text-gray-300"></ion-icon>
    <p class="mt-2 text-sm text-gray-500">No invoices match your search</p>
  </div>
</div>
