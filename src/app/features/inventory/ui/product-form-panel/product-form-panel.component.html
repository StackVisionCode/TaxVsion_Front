<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4" (click)="close()">
  <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-[28px] bg-white p-6 shadow-xl"
    (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900">{{ isEditMode() ? 'Edit Product' : 'New Product' }}</h2>
        <p class="mt-1 text-sm text-gray-500">
          {{ isEditMode() ? 'Update the details of this product' : 'Add a product to your inventory' }}
        </p>
      </div>
      <button type="button" (click)="close()"
        class="flex h-9 w-9 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        aria-label="Close panel">
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>

    <div class="mt-5 flex flex-col gap-3">
      <!-- Name -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Product name" [ngModel]="name()" name="name" (ngModelChange)="name.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <!-- SKU -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <span class="mr-2 text-sm text-gray-400">SKU</span>
        <input type="text" placeholder="e.g. SVC-1040" [ngModel]="sku()" name="sku" (ngModelChange)="sku.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <!-- Category dropdown -->
      <div class="relative" data-dropdown="product-category">
        <button type="button" (click)="toggleCategoryDropdown()"
          class="flex h-11 w-full items-center justify-between rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
          <span [class.text-gray-400]="!category()">{{ category() || 'Select category' }}</span>
          <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
        </button>
        <div *ngIf="isCategoryOpen()"
          class="absolute left-0 top-full z-20 mt-2 w-full overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
          <button *ngFor="let option of categories" type="button" (click)="selectCategory(option)"
            class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            {{ option }}
            <ion-icon *ngIf="option === category()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Price -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <span class="mr-2 text-sm text-gray-400">Price ($)</span>
        <input type="number" min="0" step="0.01" placeholder="0.00" [ngModel]="price()" name="price"
          (ngModelChange)="price.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <!-- Stock quantity -->
        <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <span class="mr-2 text-sm text-gray-400">Stock</span>
          <input type="number" min="0" step="1" placeholder="0" [ngModel]="stockQuantity()" name="stockQuantity"
            (ngModelChange)="stockQuantity.set($event)"
            class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>

        <!-- Low-stock threshold -->
        <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <span class="mr-2 text-sm text-gray-400">Low at</span>
          <input type="number" min="0" step="1" placeholder="0" [ngModel]="lowStockThreshold()" name="lowStockThreshold"
            (ngModelChange)="lowStockThreshold.set($event)"
            class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>
      </div>

      <!-- Active / inactive toggle -->
      <div class="flex items-center justify-between rounded-2xl border border-gray-100 bg-[#FAF9F7] px-4 py-3">
        <div>
          <p class="text-sm font-medium text-gray-900">{{ status() === 'active' ? 'Active' : 'Inactive' }}</p>
          <p class="text-xs text-gray-500">Inactive products stay hidden from clients</p>
        </div>
        <button type="button" (click)="toggleStatus()" role="switch" [attr.aria-checked]="status() === 'active'"
          class="relative flex h-6 w-11 items-center rounded-full transition-colors"
          [ngClass]="status() === 'active' ? 'bg-gray-900' : 'bg-gray-300'" aria-label="Toggle active status">
          <span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition-transform"
            [ngClass]="status() === 'active' ? 'translate-x-5' : 'translate-x-0.5'"></span>
        </button>
      </div>
    </div>

    <div class="mt-5 flex items-center justify-end gap-2">
      <button type="button" (click)="close()"
        class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="save()" [disabled]="!canSave()"
        class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        {{ isEditMode() ? 'Save changes' : 'Add product' }}
      </button>
    </div>
  </div>
</div>
