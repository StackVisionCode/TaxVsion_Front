<div class="wizard-card bg-white rounded-[28px] p-6">
  <!-- Header: título + volver a la lista -->
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0">
      <h2 class="text-xl font-bold text-gray-900">New Signature Request</h2>
      <p class="mt-1 text-sm text-gray-500">{{ stepSubtitle() }}</p>
    </div>
    <button type="button" (click)="close()"
      class="flex shrink-0 items-center gap-1.5 rounded-full border border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
      <ion-icon name="arrow-back-outline" class="text-base"></ion-icon>
      Back to list
    </button>
  </div>

  <!-- Stepper numerado -->
  <div class="mt-5 flex items-center gap-2">
    <ng-container *ngFor="let s of steps; let last = last">
      <button type="button" (click)="goToStep(s)" [disabled]="s >= currentStep()"
        class="flex shrink-0 items-center gap-2 rounded-full py-1 pr-2 transition-colors"
        [ngClass]="s < currentStep() ? 'cursor-pointer hover:bg-gray-50' : 'cursor-default'">
        <!-- Círculo: completado = check pop; actual = anillo; futuro = gris -->
        <span *ngIf="s < currentStep()"
          class="step-check flex h-7 w-7 items-center justify-center rounded-full bg-gray-900 text-white">
          <ion-icon name="checkmark" class="text-sm"></ion-icon>
        </span>
        <span *ngIf="s === currentStep()"
          class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-gray-900 text-xs font-bold text-gray-900 transition-colors duration-200">
          {{ s }}
        </span>
        <span *ngIf="s > currentStep()"
          class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 text-xs font-medium text-gray-400 transition-colors duration-200">
          {{ s }}
        </span>

        <span class="hidden text-sm font-medium sm:block transition-colors duration-200"
          [ngClass]="s === currentStep() ? 'text-gray-900' : s < currentStep() ? 'text-gray-600' : 'text-gray-400'">
          {{ stepTitles[s - 1] }}
        </span>
      </button>

      <!-- Conector -->
      <span *ngIf="!last" class="h-px min-w-4 flex-1 transition-colors duration-200"
        [ngClass]="s < currentStep() ? 'bg-gray-900' : 'bg-gray-200'"></span>
    </ng-container>
  </div>

  <!-- Steps -->
  <div class="mt-6">
    <!-- Step 1: client -->
    <div *ngIf="currentStep() === 1" class="step-content">
      <app-signature-wizard-client-step [selectedId]="selectedClient()?.id ?? null"
        (clientSelected)="onClientSelected($event)"></app-signature-wizard-client-step>
    </div>

    <!-- Step 2: document -->
    <div *ngIf="currentStep() === 2" class="step-content">
      <app-signature-wizard-document-step [selectedId]="selectedDocument()?.id ?? null"
        (documentSelected)="onDocumentSelected($event)"></app-signature-wizard-document-step>
    </div>

    <!-- Step 3: PDF editor (montado siempre para preservar los campos; oculto en los demás pasos) -->
    <div [hidden]="currentStep() !== 3" class="step-content">
      <app-signature-pdf-editor #editor [client]="selectedClient()" [document]="selectedDocument()"
        (fieldCountChange)="fieldCount.set($event)"></app-signature-pdf-editor>
    </div>

    <!-- Step 4: review & send -->
    <div *ngIf="currentStep() === 4" class="step-content">
      <app-signature-wizard-review-step [client]="selectedClient()" [document]="selectedDocument()"
        [signers]="signersSnapshot()" [fields]="fieldsSnapshot()" [rules]="rulesSnapshot()"
        [dueDate]="dueDate()" (dueDateChange)="dueDate.set($event)"
        [notes]="notes()" (notesChange)="notes.set($event)"></app-signature-wizard-review-step>
    </div>
  </div>

  <!-- Footer: navegación -->
  <div class="mt-6 flex items-center justify-between gap-2 border-t border-gray-100 pt-5">
    <button type="button" (click)="close()"
      class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
      Cancel
    </button>

    <div class="flex items-center gap-2">
      <button *ngIf="currentStep() > 1" type="button" (click)="back()"
        class="rounded-full border border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        Back
      </button>

      <button *ngIf="currentStep() < 4" type="button" (click)="next()" [disabled]="!canProceed()"
        class="flex items-center gap-1.5 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        Next
        <ion-icon name="arrow-forward-outline" class="text-sm"></ion-icon>
      </button>

      <button *ngIf="currentStep() === 4" type="button" (click)="send()" [disabled]="!canSend() || isSending()"
        class="flex items-center gap-1.5 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        <span *ngIf="isSending()" class="h-3.5 w-3.5 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
        <ion-icon *ngIf="!isSending()" name="paper-plane-outline" class="text-sm"></ion-icon>
        {{ isSending() ? 'Sending…' : 'Send for signature' }}
      </button>
    </div>
  </div>
</div>

<!-- Coreografía de envío: el papel se crea, se firma y sale (pantalla completa) -->
<div *ngIf="isSending()" class="send-overlay fixed inset-0 z-[60] flex flex-col items-center justify-center bg-[#FAF9F7]/95"
  [class.send-overlay-out]="sendPhase() === 'done'">
  <!-- Papel -->
  <div class="send-paper relative w-64 rounded-xl border border-gray-100 bg-white p-6 shadow-2xl shadow-indigo-200/40"
    [class.send-paper-lift]="sendPhase() === 'done'">
    <!-- Encabezado del documento -->
    <div class="paper-line h-2.5 rounded bg-gray-200" style="width: 55%"></div>

    <!-- Cuerpo: líneas que se van creando -->
    <div class="mt-4 space-y-2.5">
      <div *ngFor="let w of paperLines" class="paper-line h-2 rounded bg-gray-100" [style.width.%]="w"></div>
    </div>

    <!-- Zona de firma: el trazo se dibuja solo en la fase 'signing' -->
    <div class="mt-5 border-t-2 border-dashed border-gray-200 pt-2"
      [class.paper-signing]="sendPhase() !== 'paper'">
      <p class="text-[9px] font-medium uppercase tracking-wide text-gray-400">Signature</p>
      <svg class="mt-1 h-12 w-44" viewBox="0 0 190 62" fill="none" aria-hidden="true">
        <path class="sig-stroke"
          d="M6 42 C 18 18, 30 18, 34 38 C 37 52, 30 56, 28 46 C 26 34, 40 24, 52 38 C 60 48, 64 28, 74 28 C 84 28, 78 46, 90 44 C 104 42, 100 20, 116 22 C 132 24, 120 50, 138 44 C 150 40, 150 28, 162 32 C 172 35, 178 28, 186 22"
          stroke="#111827" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <!-- Sello de enviado (fase final) -->
    <span *ngIf="sendPhase() === 'done'"
      class="send-stamp absolute -right-3 -top-3 flex h-10 w-10 items-center justify-center rounded-full bg-emerald-500 text-white shadow-lg">
      <ion-icon name="checkmark" class="text-xl"></ion-icon>
    </span>
  </div>

  <!-- Caption -->
  <p class="send-caption mt-6 text-sm font-medium text-gray-500">{{ sendCaption() }}</p>
</div>
