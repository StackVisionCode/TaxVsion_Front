<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4" (click)="close()">
  <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-[28px] bg-white p-6 shadow-xl"
    (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900">New Signature Request</h2>
        <p class="mt-1 text-sm text-gray-500">Send a document out for one or more clients to sign</p>
      </div>
      <button type="button" (click)="close()"
        class="flex h-9 w-9 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        aria-label="Close panel">
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>

    <div class="mt-5 flex flex-col gap-3">
      <!-- Document name -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <span class="mr-2 text-sm text-gray-400">Document</span>
        <input type="text" placeholder="e.g. Engagement Letter" [ngModel]="documentName()" name="documentName"
          (ngModelChange)="documentName.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <!-- Client -->
      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <span class="mr-2 text-sm text-gray-400">Client</span>
        <input type="text" placeholder="Client name" [ngModel]="client()" name="client"
          (ngModelChange)="client.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <!-- Due date -->
      <label
        class="flex h-11 items-center gap-2 rounded-full border border-gray-200 bg-white px-4 cursor-pointer focus-within:border-gray-300 transition-colors">
        <span class="text-sm text-gray-400">Due date</span>
        <input type="date" [ngModel]="dueDate()" name="dueDate" (ngModelChange)="dueDate.set($event)"
          class="w-full bg-transparent text-sm text-gray-700 focus:outline-none cursor-pointer" />
      </label>

      <!-- Signers -->
      <div>
        <span class="text-xs font-semibold uppercase tracking-wide text-gray-400">Signers</span>
        <div class="mt-2 flex flex-col gap-2 sm:flex-row">
          <div class="flex h-10 flex-1 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <input type="text" placeholder="Signer name" [ngModel]="signerNameDraft()" name="signerNameDraft"
              (ngModelChange)="signerNameDraft.set($event)"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
          <div class="flex h-10 flex-1 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <input type="email" placeholder="Signer email" [ngModel]="signerEmailDraft()" name="signerEmailDraft"
              (ngModelChange)="signerEmailDraft.set($event)" (keydown.enter)="addSigner()"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
          <button type="button" (click)="addSigner()"
            class="flex h-10 shrink-0 items-center gap-1.5 rounded-full border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            <ion-icon name="person-add-outline" class="text-sm"></ion-icon>
            Add signer
          </button>
        </div>

        <div *ngIf="signers().length > 0" class="mt-3 flex flex-col gap-2">
          <span *ngFor="let signer of signers(); let i = index"
            class="flex items-center gap-2 rounded-full border border-gray-200 pl-1 pr-3 py-1 text-xs font-medium text-gray-700">
            <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-[10px] font-semibold text-white"
              [ngClass]="signer.color">{{ signer.initials }}</span>
            <span class="min-w-0 flex-1 truncate">{{ signer.name }} · {{ signer.email }}</span>
            <button type="button" (click)="removeSigner(i)" class="text-gray-400 hover:text-gray-700"
              aria-label="Remove signer">
              <ion-icon name="close-outline" class="text-sm"></ion-icon>
            </button>
          </span>
        </div>

        <p *ngIf="signers().length === 0" class="mt-2 text-xs text-gray-400">
          Add at least one signer before sending this request.
        </p>
      </div>

      <!-- Notes -->
      <div class="rounded-2xl border border-gray-200 bg-white px-4 py-3 focus-within:border-gray-300 transition-colors">
        <span class="text-xs font-semibold uppercase tracking-wide text-gray-400">Notes</span>
        <textarea rows="3" placeholder="Optional message for the signers" [ngModel]="notes()" name="notes"
          (ngModelChange)="notes.set($event)"
          class="mt-1 w-full resize-none bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none"></textarea>
      </div>
    </div>

    <div class="mt-5 flex items-center justify-end gap-2">
      <button type="button" (click)="close()"
        class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="send()" [disabled]="!canSend()"
        class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        Send for signature
      </button>
    </div>
  </div>
</div>
