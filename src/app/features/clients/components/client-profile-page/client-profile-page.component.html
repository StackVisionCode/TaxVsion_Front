<div class="min-h-full pt-3 pb-1 flex flex-col gap-6" *ngIf="client() as c">
  <!-- Header -->
  <div class="bg-white rounded-[28px] p-6">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <a routerLink="/clients"
          class="-ml-3 flex items-center gap-1 rounded-full px-3 py-1.5 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
          <ion-icon name="arrow-back-outline" class="text-base"></ion-icon>
          Back to clients
        </a>

        <div class="mt-3 flex items-center gap-4">
          <span class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full text-lg font-bold text-white"
            [ngClass]="avatarClass(c)">
            {{ initials(c) }}
          </span>
          <div>
            <h2 class="text-2xl font-bold text-gray-900">{{ c.displayName }}</h2>
            <div class="mt-2 flex flex-wrap items-center gap-2">
              <span class="inline-flex items-center rounded-full border px-3 py-1 text-xs font-medium"
                [ngClass]="typeBadgeClass(c)">
                {{ typeLabel(c) }}
              </span>
              <span class="inline-flex items-center gap-2 rounded-full border px-3 py-1 text-xs font-medium"
                [ngClass]="statusChip(c)">
                <span class="h-1.5 w-1.5 rounded-full" [ngClass]="statusDot(c)"></span>
                {{ statusLabel(c) }}
              </span>
            </div>
          </div>
        </div>
      </div>

      <button type="button"
        class="flex items-center gap-2 rounded-full border border-gray-200 px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
        <ion-icon name="create-outline" class="text-base"></ion-icon>
        Edit
      </button>
    </div>

    <!-- Tab nav -->
    <div class="mt-6 flex flex-wrap gap-2">
      <button *ngFor="let tab of tabs" type="button" (click)="selectTab(tab.id)"
        class="rounded-full px-4 py-2 text-sm font-medium transition-colors"
        [ngClass]="tab.id === activeTab() ? 'bg-gray-900 text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-50'">
        {{ tab.label }}
      </button>
    </div>
  </div>

  <!-- Tab content -->
  <ng-container [ngSwitch]="activeTab()">
    <app-client-profile-overview *ngSwitchCase="'overview'" [client]="c"></app-client-profile-overview>

    <app-client-profile-info *ngSwitchCase="'info'" [client]="c"></app-client-profile-info>

    <div *ngSwitchCase="'documents'" class="bg-white rounded-[28px] p-6">
      <app-client-profile-documents [clientId]="c.id"></app-client-profile-documents>
    </div>

    <div *ngSwitchCase="'invoices'" class="bg-white rounded-[28px] p-6">
      <app-client-profile-invoices [clientId]="c.id"></app-client-profile-invoices>
    </div>

    <div *ngSwitchCase="'notes'" class="bg-white rounded-[28px] p-6">
      <app-client-profile-notes [clientId]="c.id"></app-client-profile-notes>
    </div>

    <div *ngSwitchCase="'communication'" class="bg-white rounded-[28px] p-6">
      <app-client-profile-communication [clientId]="c.id"></app-client-profile-communication>
    </div>
  </ng-container>
</div>
