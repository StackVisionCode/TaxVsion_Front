<div>
  <h3 class="text-lg font-bold text-gray-900">Notes</h3>

  <div class="mt-4 flex flex-wrap items-center gap-2">
    <div class="h-10 flex-1 min-w-[200px] bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
      <input type="text" placeholder="Write a note about this client..." [ngModel]="draftText()"
        (ngModelChange)="draftText.set($event)" (keydown.enter)="addNote()"
        class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
    </div>
    <button type="button" (click)="addNote()"
      class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
      <ion-icon name="add-outline" class="text-base"></ion-icon>
      Add note
    </button>
  </div>

  <div class="mt-5 flex flex-col gap-3">
    <div *ngFor="let note of notes()" class="rounded-2xl border border-gray-100 p-4">
      <div class="flex items-center gap-3">
        <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-xs font-semibold text-white"
          [ngClass]="note.avatarColor">{{ initials(note.author) }}</span>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-gray-900">{{ note.author }}</p>
          <p class="text-xs text-gray-400">{{ note.timestamp }}</p>
        </div>
      </div>
      <p class="mt-3 text-sm leading-relaxed text-gray-700 whitespace-pre-line">{{ note.text }}</p>
    </div>

    <div *ngIf="notes().length === 0" class="px-4 py-10 text-center">
      <ion-icon name="chatbubble-ellipses-outline" class="text-3xl text-gray-300"></ion-icon>
      <p class="mt-2 text-sm text-gray-500">No notes yet for this client</p>
    </div>
  </div>
</div>
