<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4" (click)="close()">
  <div class="max-h-[90vh] w-full max-w-2xl overflow-y-auto rounded-[28px] bg-white p-6 shadow-xl"
    (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900">{{ isEditMode() ? 'Edit Client' : 'New Client' }}</h2>
        <p class="mt-1 text-sm text-gray-500">
          {{ isEditMode() ? 'Update the details of this client' : 'Add a client to your directory' }}
        </p>
      </div>
      <button type="button" (click)="close()"
        class="flex h-9 w-9 items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        aria-label="Close panel">
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>

    <!-- Individual / Company toggle -->
    <div class="mt-5 inline-flex items-center rounded-full border border-gray-200 p-1">
      <button type="button" (click)="setClientType('individual')"
        class="rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
        [ngClass]="clientType() === 'individual' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
        Individual
      </button>
      <button type="button" (click)="setClientType('company')"
        class="rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
        [ngClass]="clientType() === 'company' ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100'">
        Company
      </button>
    </div>

    <div class="mt-5 flex flex-col gap-3">
      <!-- Individual fields -->
      <ng-container *ngIf="clientType() === 'individual'">
        <div class="grid grid-cols-2 gap-3">
          <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <input type="text" placeholder="First name" [ngModel]="firstName()" name="firstName"
              (ngModelChange)="firstName.set($event)"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
          <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <input type="text" placeholder="Last name" [ngModel]="lastName()" name="lastName"
              (ngModelChange)="lastName.set($event)"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <span class="mr-2 text-sm text-gray-400">SSN/ITIN</span>
            <input type="text" placeholder="000-00-0000" [ngModel]="ssnOrItin()" name="ssnOrItin"
              (ngModelChange)="ssnOrItin.set($event)"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
          <label
            class="flex h-11 items-center gap-2 rounded-full border border-gray-200 bg-white px-4 cursor-pointer focus-within:border-gray-300 transition-colors">
            <span class="text-sm text-gray-400">DOB</span>
            <input type="date" [ngModel]="dateOfBirth()" name="dateOfBirth" (ngModelChange)="dateOfBirth.set($event)"
              class="w-full bg-transparent text-sm text-gray-700 focus:outline-none cursor-pointer" />
          </label>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <!-- Occupation dropdown -->
          <div class="relative" data-dropdown="client-occupation">
            <button type="button" (click)="toggleOccupationDropdown()"
              class="flex h-11 w-full items-center justify-between rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
              <span>{{ occupation() }}</span>
              <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
            </button>
            <div *ngIf="isOccupationOpen()"
              class="absolute left-0 top-full z-20 mt-2 w-full overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
              <button *ngFor="let option of occupations" type="button" (click)="selectOccupation(option)"
                class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                {{ option }}
                <ion-icon *ngIf="option === occupation()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
              </button>
            </div>
          </div>

          <!-- Marital status dropdown -->
          <div class="relative" data-dropdown="client-marital">
            <button type="button" (click)="toggleMaritalDropdown()"
              class="flex h-11 w-full items-center justify-between rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
              <span>{{ maritalStatus() }}</span>
              <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
            </button>
            <div *ngIf="isMaritalOpen()"
              class="absolute left-0 top-full z-20 mt-2 w-full overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
              <button *ngFor="let option of maritalStatuses" type="button" (click)="selectMaritalStatus(option)"
                class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                {{ option }}
                <ion-icon *ngIf="option === maritalStatus()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
              </button>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Company fields -->
      <ng-container *ngIf="clientType() === 'company'">
        <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <input type="text" placeholder="Business name" [ngModel]="businessName()" name="businessName"
            (ngModelChange)="businessName.set($event)"
            class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
            <span class="mr-2 text-sm text-gray-400">EIN</span>
            <input type="text" placeholder="00-0000000" [ngModel]="ein()" name="ein" (ngModelChange)="ein.set($event)"
              class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
          </div>
          <label
            class="flex h-11 items-center gap-2 rounded-full border border-gray-200 bg-white px-4 cursor-pointer focus-within:border-gray-300 transition-colors">
            <span class="text-sm text-gray-400">Formed</span>
            <input type="date" [ngModel]="formationDate()" name="formationDate" (ngModelChange)="formationDate.set($event)"
              class="w-full bg-transparent text-sm text-gray-700 focus:outline-none cursor-pointer" />
          </label>
        </div>

        <!-- Business structure dropdown -->
        <div class="relative" data-dropdown="client-structure">
          <button type="button" (click)="toggleStructureDropdown()"
            class="flex h-11 w-full items-center justify-between rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
            <span>{{ businessStructure() }}</span>
            <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
          </button>
          <div *ngIf="isStructureOpen()"
            class="absolute left-0 top-full z-20 mt-2 w-full overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
            <button *ngFor="let option of businessStructures" type="button" (click)="selectBusinessStructure(option)"
              class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              {{ option }}
              <ion-icon *ngIf="option === businessStructure()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
            </button>
          </div>
        </div>

        <textarea rows="2" placeholder="Principal business activity" [ngModel]="principalBusinessActivity()"
          name="principalBusinessActivity" (ngModelChange)="principalBusinessActivity.set($event)"
          class="w-full resize-none rounded-2xl border border-gray-100 bg-[#FAF9F7] p-4 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-300 transition-colors"></textarea>
      </ng-container>

      <!-- Shared fields -->
      <div class="mt-1 h-px w-full bg-gray-100"></div>

      <div class="grid grid-cols-2 gap-3">
        <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <input type="email" placeholder="Email" [ngModel]="email()" name="email" (ngModelChange)="email.set($event)"
            class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>
        <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
          <input type="text" placeholder="Phone" [ngModel]="phone()" name="phone" (ngModelChange)="phone.set($event)"
            class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
        </div>
      </div>

      <div class="flex h-11 items-center rounded-full border border-gray-200 bg-white px-4 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Address" [ngModel]="address()" name="address" (ngModelChange)="address.set($event)"
          class="h-full w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none" />
      </div>

      <!-- Active toggle -->
      <div class="flex items-center justify-between rounded-full border border-gray-200 bg-white px-4 py-2.5">
        <span class="text-sm font-medium text-gray-700">Active client</span>
        <button type="button" (click)="isActive.set(!isActive())"
          class="relative h-6 w-11 rounded-full transition-colors"
          [ngClass]="isActive() ? 'bg-gray-900' : 'bg-gray-200'" role="switch" [attr.aria-checked]="isActive()">
          <span class="absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-transform"
            [ngClass]="isActive() ? 'translate-x-5' : 'translate-x-0.5'"></span>
        </button>
      </div>
    </div>

    <div class="mt-5 flex items-center justify-end gap-2">
      <button type="button" (click)="close()"
        class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="save()" [disabled]="!canSave()"
        class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        {{ isEditMode() ? 'Save changes' : 'Create client' }}
      </button>
    </div>
  </div>
</div>
