<div class="min-h-full pt-3 pb-1 flex flex-col gap-6">
  <!-- Stats row -->
  <div class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(170px,1fr))]">
    <div class="rounded-[24px] bg-[#F2E3C9] p-5">
      <p class="text-sm text-gray-600">Total services</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ totalCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#CBD9F2] p-5">
      <p class="text-sm text-gray-600">Active</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ activeCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#DCDCDC] p-5">
      <p class="text-sm text-gray-600">Avg. price</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">${{ avgPrice() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#EEEBFA] p-5">
      <p class="text-sm text-gray-600">Categories</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ categories.length }}</p>
    </div>
  </div>

  <!-- Catalog -->
  <app-service-catalog [services]="services()" (addService)="openAddPanel()"></app-service-catalog>
</div>

<!-- Add service overlay -->
<div *ngIf="isAddOpen()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 p-4"
  (click)="cancelAdd()">
  <div class="w-full max-w-md rounded-[28px] bg-white p-6 shadow-xl" (click)="$event.stopPropagation()">
    <h2 class="text-xl font-bold text-gray-900">Add service</h2>
    <p class="mt-1 text-sm text-gray-500">Create a new entry in your catalog</p>

    <div class="mt-4 flex flex-col gap-3">
      <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
        <input type="text" placeholder="Service name" [ngModel]="newName()" (ngModelChange)="newName.set($event)"
          class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
      </div>

      <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
        <span class="pl-4 text-sm text-gray-400">$</span>
        <input type="number" placeholder="Price" [ngModel]="newPrice()" (ngModelChange)="newPrice.set($event)"
          class="w-full h-full bg-transparent pl-1 pr-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
      </div>

      <select [ngModel]="newCategory()" (ngModelChange)="newCategory.set($event)"
        class="h-10 rounded-full border border-gray-200 bg-white px-4 text-sm text-gray-700 focus:outline-none focus:border-gray-300">
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </div>

    <div class="mt-5 flex items-center justify-end gap-2">
      <button type="button" (click)="cancelAdd()"
        class="rounded-full px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
        Cancel
      </button>
      <button type="button" (click)="confirmAdd()" [disabled]="!canAdd()"
        class="rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        Add service
      </button>
    </div>
  </div>
</div>
