<div class="bg-white rounded-[28px] p-6">
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold text-gray-900">Submit a ticket</h2>
      <p class="mt-1 text-sm text-gray-500">Can't find your answer above? Send us the details</p>
    </div>

    <span *ngIf="submittedTicketId()"
      class="flex items-center gap-2 rounded-full border border-emerald-200 px-3 py-1.5 text-xs font-medium text-emerald-600">
      <ion-icon name="checkmark-circle-outline" class="text-sm"></ion-icon>
      Ticket #{{ submittedTicketId() }} created
      <button type="button" (click)="dismissConfirmation()" class="text-emerald-600 hover:text-emerald-800"
        aria-label="Dismiss">
        <ion-icon name="close-outline" class="text-sm"></ion-icon>
      </button>
    </span>
  </div>

  <form class="mt-4 flex flex-col gap-4" (ngSubmit)="submit()">
    <div class="flex flex-col sm:flex-row gap-3">
      <!-- Subject -->
      <div class="flex-1">
        <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
          <input type="text" placeholder="Subject" [ngModel]="subject()" name="subject"
            (ngModelChange)="subject.set($event)"
            class="w-full h-full bg-transparent px-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
        </div>
      </div>

      <!-- Category dropdown -->
      <div class="relative" data-dropdown="ticket-category">
        <button type="button" (click)="toggleCategoryDropdown()"
          class="flex h-10 w-full sm:w-48 items-center justify-between gap-2 rounded-full border border-gray-200 bg-white px-4 text-sm font-medium text-gray-900 hover:bg-gray-50 transition-colors">
          {{ category() }}
          <ion-icon name="chevron-down-outline" class="text-sm text-gray-500"></ion-icon>
        </button>

        <div *ngIf="isCategoryOpen()"
          class="absolute right-0 top-full z-20 mt-2 w-48 overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
          <button *ngFor="let option of categories" type="button" (click)="selectCategory(option)"
            class="flex w-full items-center justify-between px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            {{ option }}
            <ion-icon *ngIf="option === category()" name="checkmark-outline" class="text-sm text-gray-900"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Message -->
    <textarea rows="4" placeholder="Describe the issue..." [ngModel]="message()" name="message"
      (ngModelChange)="message.set($event)"
      class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-300 transition-colors resize-none"></textarea>

    <div>
      <button type="submit" [disabled]="!canSubmit()"
        class="flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-900 transition-colors">
        <ion-icon name="send-outline" class="text-base"></ion-icon>
        Send ticket
      </button>
    </div>
  </form>
</div>
