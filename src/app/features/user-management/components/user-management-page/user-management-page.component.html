<div class="min-h-full pt-3 pb-1 flex flex-col gap-6">
  <!-- Stats row -->
  <div class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(170px,1fr))]">
    <div class="rounded-[24px] bg-[#F2E3C9] p-5">
      <p class="text-sm text-gray-600">Total members</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ totalCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#CBD9F2] p-5">
      <p class="text-sm text-gray-600">Active</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ activeCount() }}</p>
    </div>
    <div class="rounded-[24px] bg-[#EEEBFA] p-5">
      <p class="text-sm text-gray-600">Pending invites</p>
      <p class="mt-2 text-3xl font-bold text-gray-900">{{ pendingInvitesCount() }}</p>
    </div>
  </div>

  <!-- Team card -->
  <div class="bg-white rounded-[28px] p-6">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <h2 class="text-xl font-bold text-gray-900">Team members</h2>
        <p class="mt-1 text-sm text-gray-500">Manage staff access and roles for your firm</p>
      </div>
      <span *ngIf="toast()"
        class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-3 py-1 text-xs font-medium text-emerald-700 border border-emerald-100">
        <ion-icon name="checkmark-circle-outline" class="text-sm"></ion-icon>
        {{ toast() }}
      </span>
    </div>

    <!-- Filter bar -->
    <div class="mt-4 flex flex-wrap items-center gap-3">
      <div class="relative w-full sm:w-64">
        <div class="h-9 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
          <ion-icon name="search-outline" class="absolute left-3.5 text-sm text-gray-400 pointer-events-none"></ion-icon>
          <input type="text" placeholder="Search members..." [ngModel]="search()" name="search"
            (ngModelChange)="onSearchChange($event)"
            class="w-full h-full bg-transparent pl-9 pr-3 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
        </div>
      </div>

      <button type="button" (click)="openInvitePanel()"
        class="ml-auto flex items-center gap-2 rounded-full bg-gray-900 px-5 py-2 text-sm font-semibold text-white hover:bg-gray-700 transition-colors">
        <ion-icon name="person-add-outline" class="text-base"></ion-icon>
        Invite member
      </button>
    </div>

    <!-- Table -->
    <div class="mt-5">
      <app-user-table [members]="pagedMembers()" (editRole)="openEditPanel($event)"
        (resendInvite)="resendInvite($event)" (toggleSuspend)="toggleSuspend($event)"
        (remove)="removeMember($event)"></app-user-table>
      <app-pagination [currentPage]="currentPage()" [totalItems]="filteredMembers().length" [pageSize]="pageSize"
        (pageChange)="currentPage.set($event)"></app-pagination>
    </div>
  </div>
</div>

<!-- Invite / edit overlay -->
<app-user-invite-panel [isOpen]="isPanelOpen()" [member]="editingMember()" (closed)="closePanel()"
  (saved)="handleSaved($event)"></app-user-invite-panel>

<!-- Remove confirmation -->
<app-confirm-dialog [isOpen]="!!pendingDelete()" heading="Remove member?" [message]="deleteMessage()"
  confirmLabel="Remove" (confirmed)="confirmDelete()" (cancelled)="pendingDelete.set(null)"></app-confirm-dialog>
