<div class="bg-white rounded-[28px] p-6 h-full">
  <!-- Header -->
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold text-gray-900">Documents</h2>
      <p class="mt-1 text-sm text-gray-500">Select a client to browse their files</p>
    </div>

    <!-- Search pill -->
    <div class="relative w-full sm:w-72">
      <div class="h-10 bg-white rounded-full flex items-center border border-gray-200 focus-within:border-gray-300 transition-colors">
        <ion-icon name="search-outline" class="absolute left-4 text-base text-gray-400 pointer-events-none"></ion-icon>
        <input type="text" placeholder="Search clients..." [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
          class="w-full h-full bg-transparent pl-11 pr-4 text-sm text-gray-700 placeholder-gray-400 rounded-full focus:outline-none" />
      </div>
    </div>
  </div>

  <!-- Clients table -->
  <div class="mt-4 overflow-x-auto">
    <table class="w-full min-w-[560px] border-separate border-spacing-0 text-sm">
      <thead>
        <tr>
          <th class="rounded-l-2xl bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Client</th>
          <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Email</th>
          <th class="bg-[#FAF9F7] px-4 py-3 text-center font-semibold text-gray-900">Documents</th>
          <th class="bg-[#FAF9F7] px-4 py-3 text-left font-semibold text-gray-900">Last upload</th>
          <th class="rounded-r-2xl bg-[#FAF9F7] px-4 py-3"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let client of filteredClients(); let i = index; let last = last"
          (click)="clientSelected.emit(client)" class="cursor-pointer group">
          <td class="px-4 py-4 group-hover:bg-gray-50 transition-colors rounded-l-2xl" [class.border-b]="!last"
            [class.border-gray-100]="!last">
            <span class="flex items-center gap-3">
              <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-white text-xs font-bold"
                [ngClass]="avatarClass(i)">{{ initials(client) }}</span>
              <span class="font-medium text-gray-900">{{ client.name }}</span>
            </span>
          </td>
          <td class="px-4 py-4 text-gray-600 group-hover:bg-gray-50 transition-colors" [class.border-b]="!last"
            [class.border-gray-100]="!last">{{ client.email }}</td>
          <td class="px-4 py-4 text-center group-hover:bg-gray-50 transition-colors" [class.border-b]="!last"
            [class.border-gray-100]="!last">
            <span class="inline-block rounded-full bg-gray-100 px-3 py-1 text-xs font-semibold text-gray-700">
              {{ client.docCount }}
            </span>
          </td>
          <td class="px-4 py-4 text-gray-500 group-hover:bg-gray-50 transition-colors" [class.border-b]="!last"
            [class.border-gray-100]="!last">{{ client.lastUpload }}</td>
          <td class="px-4 py-4 text-right group-hover:bg-gray-50 transition-colors rounded-r-2xl"
            [class.border-b]="!last" [class.border-gray-100]="!last">
            <ion-icon name="chevron-forward-outline" class="text-gray-300 group-hover:text-gray-500"></ion-icon>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty state -->
    <div *ngIf="filteredClients().length === 0" class="px-4 py-10 text-center">
      <ion-icon name="search-outline" class="text-3xl text-gray-300"></ion-icon>
      <p class="mt-2 text-sm text-gray-500">No clients match your search</p>
    </div>
  </div>
</div>
