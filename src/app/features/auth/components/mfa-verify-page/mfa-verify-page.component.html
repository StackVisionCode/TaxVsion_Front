<div class="min-h-screen w-full flex items-center justify-center bg-indigo-50 p-4 sm:p-8 relative overflow-hidden">
  <div class="pointer-events-none absolute -top-32 -left-32 w-96 h-96 bg-indigo-300/40 rounded-full blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-32 -right-24 w-96 h-96 bg-purple-300/40 rounded-full blur-3xl"></div>

  <div class="relative w-full max-w-md bg-white rounded-[2rem] shadow-2xl shadow-indigo-200/70 px-8 sm:px-10 py-10">
    <span class="text-indigo-600 text-3xl font-bold leading-none">*</span>

    <h1 class="mt-4 text-2xl font-bold text-gray-900">Verificación en dos pasos</h1>
    <p class="mt-2 text-sm text-gray-500">{{ methodsLabel() }}</p>

    @if (!expired()) {
      <p class="mt-1 text-xs text-gray-400">El código expira en {{ remainingSeconds() }}s.</p>
    } @else {
      <p class="mt-1 text-xs font-medium text-red-600">El código expiró. Vuelve a iniciar sesión.</p>
    }

    <form [formGroup]="form" class="mt-8 space-y-5" (ngSubmit)="onSubmit()">
      @if (!useRecovery()) {
        <div class="space-y-1.5">
          <label for="code" class="block text-sm font-medium text-gray-800">Código de verificación</label>
          <input type="text" id="code" formControlName="code" inputmode="numeric" autocomplete="one-time-code"
            maxlength="6" placeholder="000000"
            class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-center text-lg tracking-[0.5em] font-semibold placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-colors" />
        </div>
      } @else {
        <div class="space-y-1.5">
          <label for="recoveryCode" class="block text-sm font-medium text-gray-800">Código de recuperación</label>
          <input type="text" id="recoveryCode" formControlName="recoveryCode" autocomplete="off"
            placeholder="XXXXXXXX"
            class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-colors" />
        </div>
      }

      @if (!useRecovery()) {
        <label class="flex items-center gap-2 text-sm text-gray-600 select-none cursor-pointer">
          <input type="checkbox" [checked]="rememberDevice()" (change)="toggleRememberDevice()"
            class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500/30" />
          Recordar este dispositivo por 30 días
        </label>
      }

      @if (formError()) {
        <p class="text-sm font-medium text-red-600">{{ formError() }}</p>
      }

      <button type="submit" [disabled]="submitting() || expired()"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-70 text-white text-sm font-semibold transition-colors">
        @if (submitting()) {
          <span class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
          <span>Verificando...</span>
        } @else {
          <span>Verificar</span>
        }
      </button>
    </form>

    <div class="mt-6 flex items-center justify-between text-sm">
      <button type="button" (click)="toggleRecovery()" class="font-medium text-indigo-600 hover:text-indigo-500">
        {{ useRecovery() ? 'Usar código de la app' : 'Usar código de recuperación' }}
      </button>
      <a routerLink="/login" class="font-medium text-gray-500 hover:text-gray-700">Volver</a>
    </div>
  </div>
</div>
